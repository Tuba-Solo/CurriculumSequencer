<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curriculum Unit Planner</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM for the interface -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel to compile the React code in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // --- Utility Functions ---

    // Robust CSV Parser
    function parseCSV(text) {
      const result = [];
      let cur = '';
      let inQuotes = false;
      let row = [];
      
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        if (char === '"' && text[i+1] === '"') {
          cur += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          row.push(cur);
          cur = '';
        } else if (char === '\n' && !inQuotes) {
          if (cur.endsWith('\r')) cur = cur.slice(0, -1);
          row.push(cur);
          result.push(row);
          row = [];
          cur = '';
        } else {
          cur += char;
        }
      }
      
      if (cur || row.length) {
        if (cur.endsWith('\r')) cur = cur.slice(0, -1);
        row.push(cur);
        result.push(row);
      }
      
      return result;
    }

    // Logic to categorize based on specific code presence
    const getCategory = (code) => {
      if (!code) return 'other';
      const parts = code.toUpperCase().split('.');
      
      const hasU = parts.some(p => p === 'U' || /^U\d+/.test(p));
      const hasK = parts.some(p => p === 'K' || /^K\d+/.test(p));
      const hasSP = parts.some(p => p === 'SP' || /^SP\d+/.test(p));
      const hasLO = parts.some(p => p === 'LO' || /^LO\d+/.test(p));
      const hasGQ = parts.some(p => p === 'GQ' || /^GQ\d+/.test(p));

      if (hasGQ && !hasLO && !hasK && !hasU && !hasSP) return 'questions';

      if (hasU) return 'understandings';
      if (hasK) return 'knows';
      if (hasSP) return 'skills';
      if (hasLO) return 'goals';
      
      return 'other'; 
    };

    // Consolidated Color Mapping Logic
    const getCodeBgColor = (code, isHoverable = false) => {
      const upperCode = code.toUpperCase();
      
      if (upperCode.includes('LO.1') || upperCode.includes('GQ.1')) return isHoverable ? 'bg-blue-100 hover:bg-blue-200' : 'bg-blue-100';
      if (upperCode.includes('LO.2') || upperCode.includes('GQ.2')) return isHoverable ? 'bg-orange-100 hover:bg-orange-200' : 'bg-orange-100';
      if (upperCode.includes('LO.3') || upperCode.includes('GQ.3')) return isHoverable ? 'bg-red-100 hover:bg-red-200' : 'bg-red-100';
      if (upperCode.includes('LO.4') || upperCode.includes('GQ.4')) return isHoverable ? 'bg-purple-100 hover:bg-purple-200' : 'bg-purple-100';
      if (upperCode.includes('LO.5') || upperCode.includes('GQ.5')) return isHoverable ? 'bg-yellow-100 hover:bg-yellow-200' : 'bg-yellow-100';
      if (!upperCode.includes('LO')) return isHoverable ? 'bg-green-100 hover:bg-green-200' : 'bg-green-100';
      
      return isHoverable ? 'bg-white hover:brightness-95' : 'bg-gray-50'; // Fallbacks
    };

    // HTML-to-Word exporter
    const exportToWord = (unitName, items) => {
      const categories = {
        understandings: items.filter(i => getCategory(i.code) === 'understandings'),
        knows: items.filter(i => getCategory(i.code) === 'knows'),
        skills: items.filter(i => getCategory(i.code) === 'skills'),
        goals: items.filter(i => getCategory(i.code) === 'goals'),
        other: items.filter(i => getCategory(i.code) === 'other'),
        questions: items.filter(i => getCategory(i.code) === 'questions'),
      };

      const renderList = (list) => {
        if (!list || list.length === 0) return '<p><i>None selected</i></p>';
        return `<ul>${list.map(i => `<li style="margin-bottom: 6px;"><strong>${i.code}</strong>: ${i.desc}</li>`).join('')}</ul>`;
      };

      const html = `
        <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head>
          <meta charset='utf-8'>
          <title>${unitName} Plan Template</title>
          <style>
            body { font-family: 'Calibri', 'Arial', sans-serif; font-size: 11pt; }
            table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
            th, td { border: 1px solid #000; padding: 12px; vertical-align: top; }
            th { background-color: #e2e8f0; text-align: left; font-size: 14pt; }
            h1 { text-align: center; color: #1e293b; }
            h2 { font-size: 12pt; margin-top: 0; color: #334155; border-bottom: 1px solid #cbd5e1; padding-bottom: 4px; }
            ul { margin-top: 8px; padding-left: 20px; }
          </style>
        </head>
        <body>
          <h1>Understanding by Design (UbD) Unit Plan</h1>
          <h2 style="text-align: center; font-size: 16pt; border: none; margin-bottom: 30px;">${unitName}</h2>
          
          <table>
            <tr>
              <th colspan="2">Stage 1 - Desired Results</th>
            </tr>
            <tr>
              <td colspan="2">
                <h2>LEARNING OUTCOMES (LO)</h2>
                ${renderList(categories.goals)}
                
                ${categories.other.length > 0 ? `
                  <h2 style="margin-top: 15px;">ORGANIZING IDEAS (OI)</h2>
                  ${renderList(categories.other)}
                ` : ''}
              </td>
            </tr>
            <tr>
              <td style="width: 50%;">
                <h2>UNDERSTANDINGS</h2>
                <p><i>Students will understand that...</i></p>
                ${renderList(categories.understandings)}
              </td>
              <td style="width: 50%;">
                <h2>GUIDING QUESTIONS (GQ)</h2>
                ${renderList(categories.questions)}
              </td>
            </tr>
            <tr>
              <td style="width: 50%;">
                <h2>STUDENTS WILL KNOW...</h2>
                ${renderList(categories.knows)}
              </td>
              <td style="width: 50%;">
                <h2>STUDENTS WILL BE SKILLED AT...</h2>
                ${renderList(categories.skills)}
              </td>
            </tr>
          </table>
          
          <table>
            <tr><th>Stage 2 - Assessment Evidence</th></tr>
            <tr><td><br><br><br><br><br></td></tr>
          </table>
          
          <table>
            <tr><th>Stage 3 - Learning Plan</th></tr>
            <tr><td><br><br><br><br><br></td></tr>
          </table>
        </body>
        </html>
      `;

      const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `${unitName.replace(/\s+/g, '_')}_UbD_Template.doc`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };

    // --- Icons ---
    const UploadIcon = () => <svg className="w-12 h-12 text-blue-500 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>;
    const DownloadIcon = () => <svg className="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>;
    const CheckCircleIcon = () => <svg className="w-6 h-6 text-green-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
    const SaveIcon = () => <svg className="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>;

    // --- Main Application Component ---
    function App() {
      const [items, setItems] = useState([]);
      const [activeTab, setActiveTab] = useState('import');
      const [searchTerm, setSearchTerm] = useState('');
      const [saveStatus, setSaveStatus] = useState('');
      const [showResetConfirm, setShowResetConfirm] = useState(false);

      // Automatically load saved data when returning to the page
      useEffect(() => {
        const savedData = localStorage.getItem('curriculumPlannerData');
        if (savedData) {
          try {
            setItems(JSON.parse(savedData));
            setActiveTab('checklist');
          } catch (e) {
            console.error("Error loading saved data", e);
          }
        }
      }, []);

      const handleSaveProgress = () => {
        localStorage.setItem('curriculumPlannerData', JSON.stringify(items));
        setSaveStatus('Saved!');
        setTimeout(() => setSaveStatus(''), 2000); // Reverts text back after 2 seconds
      };

      const handleReset = () => {
        // Clear all Unit 1-5 selections
        setItems(items.map(item => ({ ...item, u1: false, u2: false, u3: false, u4: false, u5: false })));
        // Wipe from browser memory as well
        localStorage.removeItem('curriculumPlannerData');
        setShowResetConfirm(false);
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (evt) => {
          const text = evt.target.result;
          const parsed = parseCSV(text);
          
          // Assume the first row is headers, mapping subsequent valid rows
          const data = parsed.slice(1)
            .filter(r => r.length > 1 && r[0])
            .map((r, index) => ({
              id: index,
              code: r[0],
              desc: r[1] ? r[1].replace(/\n/g, ' ') : '',
              u1: r[2] ? r[2].toLowerCase() === 'true' : false,
              u2: r[3] ? r[3].toLowerCase() === 'true' : false,
              u3: r[4] ? r[4].toLowerCase() === 'true' : false,
              u4: r[5] ? r[5].toLowerCase() === 'true' : false,
              u5: r[6] ? r[6].toLowerCase() === 'true' : false,
            }));
          
          setItems(data);
          setActiveTab('checklist');
        };
        reader.readAsText(file);
      };

      const toggleUnit = (id, unitField) => {
        const toggledItem = items.find(i => i.id === id);
        if (!toggledItem) return;

        const newState = !toggledItem[unitField];
        const code = toggledItem.code;
        const cat = getCategory(code);
        
        let partnerMatchFn = null;
        
        // If a base LO or GQ is toggled, dynamically link its counterpart
        const numMatch = code.match(/(?:LO|GQ)\.(\d+)/);
        if (numMatch && (cat === 'goals' || cat === 'questions')) {
           const num = numMatch[1];
           if (cat === 'goals') {
              partnerMatchFn = (i) => getCategory(i.code) === 'questions' && i.code.includes(`GQ.${num}`);
           } else {
              partnerMatchFn = (i) => getCategory(i.code) === 'goals' && i.code.includes(`LO.${num}`);
           }
        }

        setItems(prevItems => prevItems.map(item => {
          if (item.id === id) {
            return { ...item, [unitField]: newState };
          }
          // Sync the corresponding LO or GQ
          if (partnerMatchFn && partnerMatchFn(item)) {
            return { ...item, [unitField]: newState };
          }
          return item;
        }));
      };

      const scrollToGroup = (groupNum) => {
        setSearchTerm(''); // Clear the search bar to ensure the item is visible on screen
        
        const executeScroll = () => {
           const match = items.find(i => {
              if (groupNum === 'OI') return !i.code.includes('LO') && !i.code.includes('GQ');
              return i.code.includes(`LO.${groupNum}`) || i.code.includes(`GQ.${groupNum}`);
           });
           
           if (match) {
              const el = document.getElementById(`row-${match.id}`);
              if (el) {
                 el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                 
                 // Apply a brief highlight effect so the user spots it immediately
                 const originalBg = el.style.backgroundColor;
                 el.style.transition = 'background-color 0.5s';
                 el.style.backgroundColor = '#fef08a'; 
                 setTimeout(() => { el.style.backgroundColor = originalBg; }, 1500);
              }
           }
        };

        if (activeTab !== 'checklist') {
           setActiveTab('checklist');
           setTimeout(executeScroll, 150); // wait for view to switch
        } else {
           setTimeout(executeScroll, 50); // wait for search clear to render
        }
      };

      const filteredItems = useMemo(() => {
        if (!searchTerm) return items;
        return items.filter(item => 
          item.code.toLowerCase().includes(searchTerm.toLowerCase()) || 
          item.desc.toLowerCase().includes(searchTerm.toLowerCase())
        );
      }, [items, searchTerm]);

      // View Components
      const renderImport = () => (
        <div className="flex flex-col items-center justify-center py-20 bg-white rounded-lg shadow-sm border border-gray-200">
          <UploadIcon />
          <h2 className="text-2xl font-bold text-gray-800 mb-2">Upload Curriculum CSV</h2>
          <p className="text-gray-500 mb-6 max-w-md text-center">
            Please upload your <strong>MAIN.csv</strong> file containing the Code, Description, and Unit columns to begin planning.
          </p>
          <label className="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg shadow-md transition-colors">
            <span>Select CSV File</span>
            <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
          </label>
        </div>
      );

      const renderChecklist = () => (
        <div className="bg-white rounded-lg shadow-sm border border-gray-200 flex flex-col" style={{ height: '70vh' }}>
          <div className="p-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
            <h2 className="text-lg font-bold text-gray-800">Master Checklist ({filteredItems.length} items)</h2>
            <div className="flex items-center space-x-3">
              <button 
                onClick={() => setShowResetConfirm(true)}
                className="px-4 py-2 bg-red-50 text-red-600 border border-red-200 rounded-md text-sm font-medium hover:bg-red-100 transition-colors"
              >
                Reset Checklist
              </button>
              <button 
                onClick={handleSaveProgress}
                className="px-4 py-2 bg-green-50 text-green-700 border border-green-200 rounded-md text-sm font-medium hover:bg-green-100 transition-colors"
              >
                {saveStatus || 'Save progress'}
              </button>
              <input 
                type="text" 
                placeholder="Search codes or descriptions..." 
                className="border border-gray-300 rounded-md px-4 py-2 w-64 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                value={searchTerm}
                onChange={(e) => setSearchTerm(e.target.value)}
              />
            </div>
          </div>
          <div className="overflow-auto flex-1 relative">
            <table className="min-w-full divide-y divide-gray-200">
              <thead className="bg-gray-100 sticky top-0 shadow-sm z-10">
                <tr>
                  <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-32">Code</th>
                  <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-2/5">Description</th>
                  <th className="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Use Count</th>
                  <th className="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Unit 1</th>
                  <th className="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Unit 2</th>
                  <th className="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Unit 3</th>
                  <th className="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Unit 4</th>
                  <th className="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Unit 5</th>
                </tr>
              </thead>
              <tbody className="bg-white divide-y divide-gray-200">
                {filteredItems.map((item) => {
                  // Bold logic: anything without U, K, or SP
                  const parts = item.code.toUpperCase().split('.');
                  const hasU = parts.some(p => p === 'U' || /^U\d+/.test(p));
                  const hasK = parts.some(p => p === 'K' || /^K\d+/.test(p));
                  const hasSP = parts.some(p => p === 'SP' || /^SP\d+/.test(p));
                  
                  const isBold = !(hasU || hasK || hasSP);
                  const textWeightClass = isBold ? 'font-bold text-gray-900' : 'font-normal text-gray-800';

                  // Row background shading logic utilizing the consolidated mapper
                  const bgClass = getCodeBgColor(item.code, true);

                  // Use Count logic
                  const useCount = [item.u1, item.u2, item.u3, item.u4, item.u5].filter(Boolean).length;
                  const useCountColor = useCount === 0 ? 'text-red-600' : 'text-green-600';

                  // Display code (only last 4 chars)
                  const displayCode = item.code.length > 4 ? item.code.slice(-4) : item.code;

                  return (
                    <tr id={`row-${item.id}`} key={item.id} className={`transition-colors border-b border-gray-200 ${bgClass}`}>
                      <td className={`px-6 py-4 text-sm break-words align-top ${textWeightClass}`}>{displayCode}</td>
                      <td className={`px-6 py-4 text-sm break-words align-top ${textWeightClass}`}>{item.desc}</td>
                      <td className={`px-4 py-4 whitespace-nowrap text-center align-top font-bold text-lg ${useCountColor}`}>{useCount}</td>
                      {['u1', 'u2', 'u3', 'u4', 'u5'].map((u) => (
                        <td key={u} className="px-4 py-4 whitespace-nowrap text-center align-top">
                          <input
                            type="checkbox"
                            className="h-5 w-5 text-blue-600 focus:ring-blue-500 border-gray-400 rounded cursor-pointer"
                            checked={item[u]}
                            onChange={() => toggleUnit(item.id, u)}
                          />
                        </td>
                      ))}
                    </tr>
                  );
                })}
                {filteredItems.length === 0 && (
                  <tr>
                    <td colSpan="8" className="px-6 py-8 text-center text-gray-500 bg-white">
                      No items found matching your search.
                    </td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        </div>
      );

      const renderUnitView = (unitNum) => {
        const unitField = `u${unitNum}`;
        const unitItems = items.filter(item => item[unitField]);
        const unitName = `Unit ${unitNum}`;
        
        const categories = {
          goals: unitItems.filter(i => getCategory(i.code) === 'goals'),
          understandings: unitItems.filter(i => getCategory(i.code) === 'understandings'),
          knows: unitItems.filter(i => getCategory(i.code) === 'knows'),
          skills: unitItems.filter(i => getCategory(i.code) === 'skills'),
          other: unitItems.filter(i => getCategory(i.code) === 'other'),
          questions: unitItems.filter(i => getCategory(i.code) === 'questions'),
        };

        const renderSection = (title, list) => (
          <div className="mb-6 bg-white p-6 rounded-lg border border-gray-200 shadow-sm">
            <h3 className="text-lg font-bold text-gray-800 mb-4 pb-2 border-b border-gray-100">{title}</h3>
            {list.length > 0 ? (
              <ul className="space-y-3">
                {list.map(item => {
                  const itemBg = getCodeBgColor(item.code, false);
                  const displayCode = item.code.length > 4 ? item.code.slice(-4) : item.code;
                  
                  return (
                    <li key={item.id} className={`flex items-start p-3 rounded-md border border-gray-100 ${itemBg}`}>
                      <CheckCircleIcon />
                      <div className="ml-3">
                        <span className="font-bold text-gray-900 block">{displayCode}</span>
                        <span className="text-gray-800 text-sm">{item.desc}</span>
                      </div>
                    </li>
                  );
                })}
              </ul>
            ) : (
              <p className="text-gray-400 italic text-sm">No items assigned to this section yet.</p>
            )}
          </div>
        );

        return (
          <div className="space-y-6 max-w-5xl mx-auto pb-10">
            <div className="flex justify-between items-center bg-white p-6 rounded-lg border border-gray-200 shadow-sm">
              <div>
                <h2 className="text-2xl font-bold text-gray-900">{unitName} Overview</h2>
                <p className="text-gray-500 text-sm mt-1">{unitItems.length} items total allocated to this unit.</p>
              </div>
              <button 
                onClick={() => exportToWord(unitName, unitItems)}
                disabled={unitItems.length === 0}
                className={`flex items-center px-6 py-3 rounded-lg font-medium shadow-sm transition-all
                  ${unitItems.length > 0 
                    ? 'bg-green-600 hover:bg-green-700 text-white' 
                    : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
              >
                <DownloadIcon />
                Generate Unit Plan Template
              </button>
            </div>

            <div className="space-y-6">
              {renderSection('Organizing Ideas (OI)', categories.other)}
              {renderSection('Learning Outcomes (LO)', categories.goals)}
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {renderSection('Understandings (U)', categories.understandings)}
                {renderSection('Guiding Questions (GQ)', categories.questions)}
              </div>
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {renderSection('Students will know... (K)', categories.knows)}
                {renderSection('Students will be skilled at... (SP)', categories.skills)}
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-gray-50 font-sans text-gray-900">
          <header className="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-20">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between h-16 items-center">
                <h1 className="text-xl font-bold text-blue-900 flex items-center">
                  <SaveIcon />
                  Curriculum Unit Planner
                </h1>
                <nav className="flex space-x-1">
                  {['import', 'checklist', 'u1', 'u2', 'u3', 'u4', 'u5'].map((tab) => {
                    const isUnit = tab.startsWith('u');
                    const label = isUnit ? `Unit ${tab.replace('u', '')}` : (tab === 'import' ? 'Data Import' : 'MAIN Checklist');
                    const isDisabled = items.length === 0 && tab !== 'import';
                    
                    return (
                      <button
                        key={tab}
                        onClick={() => setActiveTab(tab)}
                        disabled={isDisabled}
                        className={`px-4 py-2 text-sm font-medium rounded-md transition-colors
                          ${activeTab === tab 
                            ? 'bg-blue-100 text-blue-800' 
                            : 'text-gray-600 hover:bg-gray-100'}
                          ${isDisabled ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'}
                        `}
                      >
                        {label}
                      </button>
                    );
                  })}
                </nav>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {/* Color Legend displayed globally when data is loaded */}
            {items.length > 0 && activeTab !== 'import' && (
              <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-200 mb-6 flex flex-wrap items-center gap-x-6 gap-y-3 text-sm select-none">
                <strong className="text-gray-800 uppercase tracking-wide text-xs">Color Legend:</strong>
                <div onClick={() => scrollToGroup('OI')} className="flex items-center cursor-pointer hover:opacity-70 transition-opacity" title="Click to scroll to OI"><span className="w-4 h-4 rounded bg-green-100 border border-green-300 mr-2"></span> Organizing Ideas (OI)</div>
                <div onClick={() => scrollToGroup('1')} className="flex items-center cursor-pointer hover:opacity-70 transition-opacity" title="Click to scroll to LO.1 / GQ.1"><span className="w-4 h-4 rounded bg-blue-100 border border-blue-300 mr-2"></span> LO.1 / GQ.1</div>
                <div onClick={() => scrollToGroup('2')} className="flex items-center cursor-pointer hover:opacity-70 transition-opacity" title="Click to scroll to LO.2 / GQ.2"><span className="w-4 h-4 rounded bg-orange-100 border border-orange-300 mr-2"></span> LO.2 / GQ.2</div>
                <div onClick={() => scrollToGroup('3')} className="flex items-center cursor-pointer hover:opacity-70 transition-opacity" title="Click to scroll to LO.3 / GQ.3"><span className="w-4 h-4 rounded bg-red-100 border border-red-300 mr-2"></span> LO.3 / GQ.3</div>
                <div onClick={() => scrollToGroup('4')} className="flex items-center cursor-pointer hover:opacity-70 transition-opacity" title="Click to scroll to LO.4 / GQ.4"><span className="w-4 h-4 rounded bg-purple-100 border border-purple-300 mr-2"></span> LO.4 / GQ.4</div>
                <div onClick={() => scrollToGroup('5')} className="flex items-center cursor-pointer hover:opacity-70 transition-opacity" title="Click to scroll to LO.5 / GQ.5"><span className="w-4 h-4 rounded bg-yellow-100 border border-yellow-300 mr-2"></span> LO.5 / GQ.5</div>
              </div>
            )}

            {activeTab === 'import' && renderImport()}
            {activeTab === 'checklist' && items.length > 0 && renderChecklist()}
            {activeTab === 'u1' && items.length > 0 && renderUnitView(1)}
            {activeTab === 'u2' && items.length > 0 && renderUnitView(2)}
            {activeTab === 'u3' && items.length > 0 && renderUnitView(3)}
            {activeTab === 'u4' && items.length > 0 && renderUnitView(4)}
            {activeTab === 'u5' && items.length > 0 && renderUnitView(5)}
          </main>

          {/* Reset Confirmation Modal */}
          {showResetConfirm && (
            <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
              <div className="bg-white p-6 rounded-lg shadow-xl max-w-sm w-full mx-4">
                <h3 className="text-xl font-bold text-gray-900 mb-2">Are you sure?</h3>
                <p className="text-gray-600 mb-6">This will clear all unit selections from the checklist. This action cannot be undone.</p>
                <div className="flex justify-end space-x-3">
                  <button 
                    onClick={() => setShowResetConfirm(false)} 
                    className="px-4 py-2 bg-gray-200 text-gray-800 rounded-md font-medium hover:bg-gray-300 transition-colors"
                  >
                    No
                  </button>
                  <button 
                    onClick={handleReset} 
                    className="px-4 py-2 bg-red-600 text-white rounded-md font-medium hover:bg-red-700 transition-colors"
                  >
                    Yes
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
