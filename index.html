<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curriculum Unit Planner</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'eips-green': '#00957E',
            'eips-lime': '#A4D55F',
            'eips-orange': '#FF6B00'
          }
        }
      }
    }
  </script>
  
  <!-- React and ReactDOM for the interface -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel to compile the React code in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- HTML to DOCX Converter -->
  <script src="https://unpkg.com/html-docx-js@0.3.1/dist/html-docx.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // --- Utility Functions ---

    // Robust CSV Parser
    function parseCSV(text) {
      const result = [];
      let cur = '';
      let inQuotes = false;
      let row = [];
      
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        if (char === '"' && text[i+1] === '"') {
          cur += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          row.push(cur);
          cur = '';
        } else if (char === '\n' && !inQuotes) {
          if (cur.endsWith('\r')) cur = cur.slice(0, -1);
          row.push(cur);
          result.push(row);
          row = [];
          cur = '';
        } else {
          cur += char;
        }
      }
      
      if (cur || row.length) {
        if (cur.endsWith('\r')) cur = cur.slice(0, -1);
        row.push(cur);
        result.push(row);
      }
      
      return result;
    }

    // Logic to categorize based on specific code presence
    const getCategory = (code) => {
      if (!code) return 'other';
      const parts = code.toUpperCase().split('.');
      
      const hasU = parts.some(p => p === 'U' || /^U\d+/.test(p));
      const hasK = parts.some(p => p === 'K' || /^K\d+/.test(p));
      const hasSP = parts.some(p => p === 'SP' || /^SP\d+/.test(p));
      const hasLO = parts.some(p => p === 'LO' || /^LO\d+/.test(p));
      const hasGQ = parts.some(p => p === 'GQ' || /^GQ\d+/.test(p));

      // Reverse priority check: deepest nested elements first
      if (hasK) return 'knows';
      if (hasSP) return 'skills';
      if (hasU) return 'understandings';
      if (hasLO) return 'goals';
      if (hasGQ) return 'questions';
      
      return 'other'; 
    };

    // Extended Colour Palette for dynamic scaling
    const colorPalette = [
      { light: 'bg-blue-100', hover: 'hover:bg-blue-200', border: 'border-blue-300' },
      { light: 'bg-orange-100', hover: 'hover:bg-orange-200', border: 'border-orange-300' },
      { light: 'bg-red-100', hover: 'hover:bg-red-200', border: 'border-red-300' },
      { light: 'bg-purple-100', hover: 'hover:bg-purple-200', border: 'border-purple-300' },
      { light: 'bg-yellow-100', hover: 'hover:bg-yellow-200', border: 'border-yellow-300' },
      { light: 'bg-teal-100', hover: 'hover:bg-teal-200', border: 'border-teal-300' },
      { light: 'bg-pink-100', hover: 'hover:bg-pink-200', border: 'border-pink-300' },
      { light: 'bg-indigo-100', hover: 'hover:bg-indigo-200', border: 'border-indigo-300' },
      { light: 'bg-cyan-100', hover: 'hover:bg-cyan-200', border: 'border-cyan-300' },
      { light: 'bg-lime-100', hover: 'hover:bg-lime-200', border: 'border-lime-300' },
      { light: 'bg-rose-100', hover: 'hover:bg-rose-200', border: 'border-rose-300' },
      { light: 'bg-emerald-100', hover: 'hover:bg-emerald-200', border: 'border-emerald-300' }
    ];

    // Consolidated Colour Mapping Logic
    const getCodeBgColor = (code, isHoverable = false) => {
      const upperCode = code.toUpperCase();
      
      // Match LO.# or GQ.# to assign specific colour dynamically
      const match = upperCode.match(/(?:LO|GQ)\.(\d+)/);
      if (match) {
         const num = parseInt(match[1], 10);
         const colorObj = colorPalette[(num - 1) % colorPalette.length];
         return isHoverable ? `${colorObj.light} ${colorObj.hover}` : colorObj.light;
      }
      
      // Broad OI fallback logic
      if (!upperCode.includes('LO') && !upperCode.includes('GQ')) {
         return isHoverable ? 'bg-green-100 hover:bg-green-200' : 'bg-green-100';
      }
      
      return isHoverable ? 'bg-white hover:brightness-95' : 'bg-gray-50'; // Fallbacks
    };

    // HTML-to-Word exporter
    const exportToWord = (unitName, items) => {
      const categories = {
        understandings: items.filter(i => getCategory(i.code) === 'understandings'),
        knows: items.filter(i => getCategory(i.code) === 'knows'),
        skills: items.filter(i => getCategory(i.code) === 'skills'),
        goals: items.filter(i => getCategory(i.code) === 'goals'),
        other: items.filter(i => getCategory(i.code) === 'other'),
        questions: items.filter(i => getCategory(i.code) === 'questions'),
      };

      const renderList = (list) => {
        if (!list || list.length === 0) return '<p><i>None selected</i></p>';
        return `<ul>${list.map(i => `<li style="margin-bottom: 6px;"><strong>${i.code}</strong>: ${i.desc}</li>`).join('')}</ul>`;
      };

      const html = `
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset='utf-8'>
          <title>${unitName} Plan Template</title>
          <style>
            body { font-family: 'Calibri', 'Arial', sans-serif; font-size: 11pt; }
            table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
            th, td { border: 1px solid #000; padding: 12px; vertical-align: top; }
            th { background-color: #e2e8f0; text-align: left; font-size: 14pt; }
            h1 { text-align: center; color: #1e293b; font-size: 18pt; margin-bottom: 20px; }
            h2 { font-size: 12pt; margin-top: 0; color: #334155; border-bottom: 1px solid #cbd5e1; padding-bottom: 4px; }
            ul { margin-top: 8px; padding-left: 20px; }
            .meta-table th { background-color: #f8fafc; width: 20%; font-size: 12pt; }
            .meta-table td { width: 80%; }
            .instruction-text { background-color: #f8fafc; color: #475569; font-style: italic; }
          </style>
        </head>
        <body>
          <h1>Understanding by Design (UbD) Unit Plan</h1>
          
          <table class="meta-table">
            <tr><th>Title of Unit</th><td><strong>${unitName}</strong></td></tr>
            <tr><th>Grade Level</th><td></td></tr>
            <tr><th>Subject</th><td></td></tr>
            <tr><th>Time Frame</th><td></td></tr>
            <tr><th>Developed By</th><td></td></tr>
          </table>
          
          <table>
            <tr>
              <th colspan="2">Stage 1 - Desired Results</th>
            </tr>
            <tr>
              <td colspan="2">
                <h2>LEARNING OUTCOMES (LO)</h2>
                ${renderList(categories.goals)}
                
                ${categories.other.length > 0 ? `
                  <h2 style="margin-top: 15px;">ORGANISING IDEAS (OI)</h2>
                  ${renderList(categories.other)}
                ` : ''}
              </td>
            </tr>
            <tr>
              <td style="width: 50%;">
                <h2>UNDERSTANDINGS</h2>
                <p><i>Students will understand that...</i></p>
                ${renderList(categories.understandings)}
              </td>
              <td style="width: 50%;">
                <h2>GUIDING QUESTIONS (GQ)</h2>
                ${renderList(categories.questions)}
              </td>
            </tr>
            <tr>
              <td style="width: 50%;">
                <h2>KNOWLEDGE</h2>
                <p><i>Students will know...</i></p>
                ${renderList(categories.knows)}
              </td>
              <td style="width: 50%;">
                <h2>SKILLS & PROCEDURES</h2>
                <p><i>Students will be skilled at...</i></p>
                ${renderList(categories.skills)}
              </td>
            </tr>
          </table>
          
          <table>
            <tr><th colspan="3">Stage 2 - Assessment Evidence</th></tr>
            <tr>
              <td colspan="3">
                <h2>Performance Task</h2>
                <p>Through what authentic performance task will students demonstrate the desired understandings, knowledge, and skills? (describes the learning activity in “story” form. Typically, the P.T. describes a scenario or situation that requires students to apply knowledge and skills to demonstrate their understanding in a real life situation. Describe your performance task scenario below. By what criteria will performances of understanding be judged?</p>
              </td>
            </tr>
            <tr>
              <td style="width: 33.33%;"><strong>Evaluative Criteria</strong><br><br><br><br><br></td>
              <td colspan="2" style="width: 66.66%;"><strong>Elements of the Performance Task</strong><br><br><br><br><br></td>
            </tr>
            <tr>
              <td colspan="3">
                <h2>Other Evidence</h2>
                <p>Through what other evidence (work samples, observations, quizzes, tests, journals or other means) will students demonstrate achievement of the desired results? Formative and summative assessments used throughout the unit to arrive at the outcomes.</p>
              </td>
            </tr>
            <tr>
              <td style="width: 33.33%;"><strong>Evaluative Criteria</strong><br><br><br><br></td>
              <td style="width: 33.33%;"><strong>Evidence</strong><br><br><br><br></td>
              <td style="width: 33.33%;"><strong>Conversation, Observation, or Product?</strong><br><br><br><br></td>
            </tr>
            <tr>
              <td colspan="3">
                <h2>Student Self-Assessment</h2>
                <p>How will students reflect upon or self-assess their learning?</p>
              </td>
            </tr>
            <tr>
              <td colspan="3"><br><br><br><br><br></td>
            </tr>
          </table>
          
          <table>
            <tr><th colspan="6">Stage 3 - Learning Plan</th></tr>
            <tr>
              <td colspan="6" class="instruction-text">
                <p>What teaching and learning experiences will you use to:</p>
                <ul>
                  <li>achieve the desired results identified in Stage 1?</li>
                  <li>equip students to complete the assessment tasks identified in Stage 2?</li>
                </ul>
              </td>
            </tr>
            <tr>
              <td colspan="6" class="instruction-text">
                <p>Where are your students headed? Where have they been? How will you make sure the students know where they are going?</p>
                <p>What experiences do the learners bring to the unit? How have the interests of the learners been ascertained? Have the learners been part of the pre-planning in any way? What individual needs do you anticipate will need to be addressed?</p>
                <p>Learning environment: Where can this learning best occur? How can the physical environment be arranged to enhance learning?</p>
              </td>
            </tr>
            <tr>
              <td colspan="6"><br><br><br><br><br></td>
            </tr>
            <tr>
              <td colspan="6" class="instruction-text">
                <p>How will you engage students at the beginning of the unit?</p>
              </td>
            </tr>
            <tr>
              <td colspan="6"><br><br><br><br><br></td>
            </tr>
            <tr>
              <td colspan="6" class="instruction-text">
                <p>What events will help students experience and explore the enduring understandings and essential questions in the unit? How will you equip them with needed skills and knowledge?</p>
              </td>
            </tr>
            <tr>
              <th style="width: 5%; background-color: #e2e8f0; font-size: 11pt;">#</th>
              <th style="width: 15%; background-color: #e2e8f0; font-size: 11pt;">Lesson Title</th>
              <th style="width: 35%; background-color: #e2e8f0; font-size: 11pt;">Lesson Activities</th>
              <th style="width: 15%; background-color: #e2e8f0; font-size: 11pt;">KUSPs</th>
              <th style="width: 15%; background-color: #e2e8f0; font-size: 11pt;">Cross-curricular Competencies</th>
              <th style="width: 15%; background-color: #e2e8f0; font-size: 11pt;">Resources</th>
            </tr>
            ${Array(10).fill('<tr><td><br><br></td><td></td><td></td><td></td><td></td><td></td></tr>').join('')}
          </table>
        </body>
        </html>
      `;

      // Use html-docx-js to convert the HTML string into a true .docx Blob
      const convertedBlob = window.htmlDocx.asBlob(html);
      const url = URL.createObjectURL(convertedBlob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `${unitName.replace(/\s+/g, '_')}_UbD_Template.docx`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };

    // --- Components ---
    const AccordionItem = ({ title, children }) => {
      const [isOpen, setIsOpen] = useState(false);
      return (
        <div className="border border-gray-200 rounded-md overflow-hidden bg-white mb-3 shadow-sm">
          <button
            className="w-full text-left px-5 py-4 bg-gray-50 hover:bg-gray-100 flex justify-between items-center focus:outline-none transition-colors"
            onClick={() => setIsOpen(!isOpen)}
          >
            <span className="font-bold text-gray-800 text-base">{title}</span>
            <svg 
              className={`w-5 h-5 text-gray-500 transform transition-transform duration-200 ${isOpen ? 'rotate-180' : ''}`} 
              fill="none" viewBox="0 0 24 24" stroke="currentColor"
            >
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
            </svg>
          </button>
          {isOpen && (
            <div className="px-5 py-4 text-gray-700 text-sm md:text-base leading-relaxed border-t border-gray-200 bg-white">
              {children}
            </div>
          )}
        </div>
      );
    };

    // --- Icons ---
    const DownloadIcon = () => <svg className="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>;
    const CheckCircleIcon = () => <svg className="w-6 h-6 text-eips-green flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
    const SaveIcon = () => <svg className="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>;
    const WarningIcon = () => <svg className="w-6 h-6 text-eips-orange mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>;
    const InfoIcon = () => <svg className="w-6 h-6 text-eips-lime mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
    const BookIcon = () => <svg className="w-6 h-6 text-eips-green mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>;
    const LightbulbIcon = () => <svg className="w-6 h-6 text-eips-orange mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" /></svg>;
    const DatabaseIcon = () => <svg className="w-12 h-12 text-eips-green mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" /></svg>;

    // --- Main Application Component ---
    function App() {
      const [items, setItems] = useState([]);
      const [activeTab, setActiveTab] = useState('course');
      const [searchTerm, setSearchTerm] = useState('');
      const [saveStatus, setSaveStatus] = useState('');
      const [showInstructions, setShowInstructions] = useState(true);
      
      // Custom Scrollbar References
      const tableRef = useRef(null);
      const scrollRef = useRef(null);

      // Course Selection Config
      const [appConfig, setAppConfig] = useState({ grade: '7', subject: 'Social Studies', numUnits: 5 });
      const [loadedConfig, setLoadedConfig] = useState(null);
      const [loadingData, setLoadingData] = useState(false);
      const [loadError, setLoadError] = useState('');
      
      // Modals State
      const [showResetConfirm, setShowResetConfirm] = useState(false);
      const [showSavePrompt, setShowSavePrompt] = useState(false);
      const [showCourseConfirm, setShowCourseConfirm] = useState(false);
      const [pendingTab, setPendingTab] = useState(null);

      // Automatically load saved data when returning to the page
      useEffect(() => {
        const savedData = localStorage.getItem('curriculumPlannerData');
        if (savedData) {
          try {
            const parsed = JSON.parse(savedData);
            if (parsed.items && parsed.loadedConfig) {
              setItems(parsed.items);
              setLoadedConfig(parsed.loadedConfig);
              setAppConfig(parsed.loadedConfig);
              setActiveTab('checklist');
            } else if (Array.isArray(parsed)) {
              localStorage.removeItem('curriculumPlannerData');
            }
          } catch (e) {
            console.error("Error loading saved data", e);
          }
        }
      }, []);

      const handleSaveProgress = () => {
        localStorage.setItem('curriculumPlannerData', JSON.stringify({ items, loadedConfig }));
        setSaveStatus('Saved!');
        setTimeout(() => setSaveStatus(''), 2000); 
      };

      const handleReset = () => {
        if (!loadedConfig) return;
        const clearedItems = items.map(item => {
          const newItem = { ...item };
          for(let i = 1; i <= loadedConfig.numUnits; i++) {
            newItem[`u${i}`] = false;
          }
          return newItem;
        });
        setItems(clearedItems);
        localStorage.setItem('curriculumPlannerData', JSON.stringify({ items: clearedItems, loadedConfig }));
        setShowResetConfirm(false);
      };

      // Executes the fetch for the selected CSV file
      const executeLoadCourse = async () => {
        setShowCourseConfirm(false);
        setLoadingData(true);
        setLoadError('');
        
        const subjectMap = {
          'Math': 'math',
          'Social Studies': 'social-studies',
          'Physical Education and Wellness': 'pew',
          'Career Education and Financial Literacy': 'cefl'
        };
        
        const fileName = `${appConfig.grade}_${subjectMap[appConfig.subject]}.csv`;
        
        try {
          const res = await fetch(fileName);
          if (!res.ok) {
             throw new Error(`Could not find file: ${fileName}. Please ensure it is saved in the same directory as this index file.`);
          }
          const text = await res.text();
          const parsed = parseCSV(text);
          
          const data = parsed.slice(1)
            .filter(r => r.length > 1 && r[0])
            .map((r, index) => {
              const item = {
                id: index,
                code: r[0],
                desc: r[1] ? r[1].replace(/\n/g, ' ') : ''
              };
              for(let i = 1; i <= appConfig.numUnits; i++) {
                item[`u${i}`] = false;
              }
              return item;
            });
            
          setItems(data);
          setLoadedConfig(appConfig);
          setActiveTab('checklist');
        } catch(err) {
          setLoadError(err.message);
        } finally {
          setLoadingData(false);
        }
      };

      const handleLoadClick = () => {
        if (items.length > 0) {
           setShowCourseConfirm(true);
        } else {
           executeLoadCourse();
        }
      };

      // Custom synced horizontal scrolling behavior 
      const handleTableScroll = (e) => {
        if (scrollRef.current && scrollRef.current.scrollLeft !== e.target.scrollLeft) {
          scrollRef.current.scrollLeft = e.target.scrollLeft;
        }
      };

      const handleFakeScroll = (e) => {
        if (tableRef.current && tableRef.current.scrollLeft !== e.target.scrollLeft) {
          tableRef.current.scrollLeft = e.target.scrollLeft;
        }
      };

      const toggleUnit = (id, unitField) => {
        const toggledItem = items.find(i => i.id === id);
        if (!toggledItem) return;

        const newState = !toggledItem[unitField];
        const code = toggledItem.code;
        const cat = getCategory(code);
        
        let partnerMatchFn = null;
        let parentMatchFns = [];
        
        const numMatch = code.match(/(?:LO|GQ)\.(\d+)/);
        if (numMatch && (cat === 'goals' || cat === 'questions')) {
           const num = numMatch[1];
           if (cat === 'goals') {
              const regex = new RegExp(`(?:^|\\.)GQ\\.${num}(?:$|\\.)`);
              partnerMatchFn = (i) => getCategory(i.code) === 'questions' && regex.test(i.code);
           } else {
              const regex = new RegExp(`(?:^|\\.)LO\\.${num}(?:$|\\.)`);
              partnerMatchFn = (i) => getCategory(i.code) === 'goals' && regex.test(i.code);
           }
        }

        // If a U, K, or SP is selected, auto-select its corresponding OI, LO, GQ, and parent U (if applicable)
        const isChild = cat === 'understandings' || cat === 'knows' || cat === 'skills';
        if (newState === true && isChild) {
           // Extract the exact parent prefixes directly from the string to support any level of nesting
           const oiMatch = code.match(/(.*?OI\.\d+)/);
           if (oiMatch) parentMatchFns.push((i) => i.code === oiMatch[1]);

           const gqMatch = code.match(/(.*?GQ\.\d+)/);
           if (gqMatch) parentMatchFns.push((i) => i.code === gqMatch[1]);

           const loMatch = code.match(/(.*?LO\.\d+)/);
           if (loMatch) parentMatchFns.push((i) => i.code === loMatch[1]);

           const uMatch = code.match(/(.*?U\.\d+)/);
           if (uMatch && (cat === 'knows' || cat === 'skills')) {
              parentMatchFns.push((i) => i.code === uMatch[1]);
           }
        }

        setItems(prevItems => prevItems.map(item => {
          let updatedItem = { ...item };
          let changed = false;

          if (item.id === id) {
            updatedItem[unitField] = newState;
            changed = true;
          } else if (partnerMatchFn && partnerMatchFn(item)) {

                   </select>
                   <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                   </div>
                </div>

                <input 
                  type="text" 
                  placeholder="Search codes or descriptions..." 
                  className="border border-gray-300 rounded-md px-4 py-2 w-64 text-sm focus:outline-none focus:ring-2 focus:ring-eips-green focus:border-eips-green"
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                />
              </div>
            </div>

            {/* Collapsible Instructions Banner */}
            {showInstructions && (
              <div className="bg-eips-green/5 border-b border-eips-green/20 px-6 py-4 shrink-0 relative z-40 flex justify-between items-start">
                <div>
                  <h3 className="font-bold text-eips-green text-sm mb-2 flex items-center">
                    <svg className="w-5 h-5 text-eips-green mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    How to use this checklist:
                  </h3>
                  <ul className="list-disc pl-7 text-sm text-gray-700 space-y-1.5 marker:text-eips-green">
                    <li><strong>Map Curriculum:</strong> Check boxes to assign items to specific units. Selecting a specific knowledge (K) or skill & procedure (SP) will automatically check its parent Understanding (U), Learning Outcome (LO), and Guiding Question (GQ).</li>
                    <li><strong>Track Coverage:</strong> The <em>Use Count</em> column shows a red '0' for unassigned items. Your goal is to ensure every item turns green by the end of the year.</li>
                    <li><strong>Generate Plans:</strong> When ready, use the <em>View Unit Plan...</em> dropdown in the top navigation bar to review your assembled units and download your pre-formatted Word Document template.</li>
                  </ul>
                </div>
                <button 
                  onClick={() => setShowInstructions(false)} 
                  className="text-gray-400 hover:text-eips-green transition-colors p-1"
                  title="Dismiss Instructions"
                >
                  <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
              </div>
            )}
            
            {/* Split Scrolling System Implementation with Option 3 Card Groups */}
            <div className="overflow-hidden flex-1 flex flex-col relative bg-gray-50 rounded-b-lg">
              
              <div 
                className="flex-1 overflow-y-auto overflow-x-auto hide-native-scrollbar-x custom-scrollbar-y"
                ref={tableRef}
                onScroll={handleTableScroll}
              >
                {/* Global Sticky Header (Flex based to match new structure) */}
                <div className="flex w-max min-w-full bg-gray-100 border-b border-gray-300 sticky top-0 z-40 shadow-sm">
                  <div className="w-[120px] shrink-0 px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider sticky left-0 z-50 bg-gray-100">Code</div>
                  <div className="w-[400px] shrink-0 px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider sticky left-[120px] z-50 bg-gray-100 border-r-2 border-gray-300 shadow-[4px_0_6px_-2px_rgba(0,0,0,0.05)]">Description</div>
                  <div className="w-[100px] shrink-0 px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Use Count</div>
                  {Array.from({length: unitCount}, (_, i) => (
                    <div key={`th-u${i+1}`} className="w-[80px] shrink-0 px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Unit {i+1}</div>
                  ))}
                </div>

                {/* Grouped Cards Container */}
                <div className="p-6 w-max min-w-full flex flex-col">
                  {groupedCards.map((group, index) => {
                    if (group.type === 'oi') {
                      return (
                        <div className="mb-6 border border-gray-300 rounded-lg shadow-md overflow-hidden flex flex-col w-max min-w-full" key={group.item.id}>
                          {renderRow(group.item, 'oi')}
                        </div>
                      );
                    } else if (group.type === 'gq') {
                      return (
                        <div className="mb-6 border border-gray-200 rounded-lg shadow-sm overflow-hidden flex flex-col w-max min-w-full" key={group.item.id}>
                          {renderRow(group.item, 'gq')}
                        </div>
                      );
                    } else if (group.type === 'lo_card') {
                      return (
                        <div className="mb-8 bg-white border border-gray-300 rounded-lg shadow-sm flex flex-col w-max min-w-full overflow-hidden" key={`card-${index}`}>
                          {renderRow(group.header, 'lo')}
                          {group.children.map(child => renderRow(child, 'child'))}
                        </div>
                      );
                    } else {
                      return renderRow(group.item, 'orphan');
                    }
                  })}
                  {filteredItems.length === 0 && (
                    <div className="py-8 text-center text-gray-500 w-full">
                      No items found matching your search.
                    </div>
                  )}
                </div>
              </div>

              {/* Offset Fake Horizontal Scrollbar Component */}
              <div className="flex bg-gray-50 border-t border-gray-200 shrink-0 relative z-50">
                 {/* Solid spacer matching the frozen column width exactly */}
                 <div className="w-[520px] shrink-0 border-r-2 border-gray-300 bg-gray-100"></div>
                 {/* Scroll track matching remainder width */}
                 <div 
                    className="flex-1 overflow-x-auto overflow-y-hidden custom-scrollbar-x"
                    ref={scrollRef}
                    onScroll={handleFakeScroll}
                 >
                    {/* Inner virtual width mapped to real columns (100px + 80px per unit) */}
                    <div style={{ width: `${100 + (unitCount * 80)}px`, height: '1px' }}></div>
                 </div>
              </div>
            </div>

          </div>
        );
      };

      const renderUnitView = (unitNum) => {
        const unitField = `u${unitNum}`;
        const unitItems = items.filter(item => item[unitField]);
        const unitName = `Unit ${unitNum}`;
        
        const categories = {
          goals: unitItems.filter(i => getCategory(i.code) === 'goals'),
          understandings: unitItems.filter(i => getCategory(i.code) === 'understandings'),
          knows: unitItems.filter(i => getCategory(i.code) === 'knows'),
          skills: unitItems.filter(i => getCategory(i.code) === 'skills'),
          other: unitItems.filter(i => getCategory(i.code) === 'other'),
          questions: unitItems.filter(i => getCategory(i.code) === 'questions'),
        };

        const renderSection = (title, list) => (
          <div className="mb-6 bg-white p-6 rounded-lg border border-gray-200 shadow-sm">
            <h3 className="text-lg font-bold text-gray-800 mb-4 pb-2 border-b border-gray-100">{title}</h3>
            {list.length > 0 ? (
              <ul className="space-y-3">
                {list.map(item => {
                  const itemBg = getCodeBgColor(item.code, false);
                  const codeParts = item.code.split('.');
                  const displayCode = codeParts.length > 1 ? codeParts.slice(-2).join('.') : item.code;
                  
                  return (
                    <li key={item.id} className={`flex items-start p-3 rounded-md border border-gray-100 ${itemBg}`}>
                      <CheckCircleIcon />
                      <div className="ml-3">
                        <span className="font-bold text-gray-900 block">{displayCode}</span>
                        <span className="text-gray-800 text-sm">{item.desc}</span>
                      </div>
                    </li>
                  );
                })}
              </ul>
            ) : (
              <p className="text-gray-400 italic text-sm">No items assigned to this section yet.</p>
            )}
          </div>
        );

        return (
          <div className="space-y-6 max-w-5xl mx-auto pb-10">
            <div className="flex justify-between items-center bg-white p-6 rounded-lg border border-gray-200 shadow-sm">
              <div>
                <h2 className="text-2xl font-bold text-gray-900">{unitName} Overview</h2>
                <p className="text-gray-500 text-sm mt-1">{unitItems.length} items total allocated to this unit.</p>
              </div>
              <div className="flex items-center space-x-3">
                <button 
                  onClick={() => handleTabClick('checklist')}
                  className="flex items-center px-4 py-3 bg-white border border-gray-300 text-gray-700 rounded-lg font-medium shadow-sm hover:text-eips-green hover:border-eips-green/50 hover:bg-gray-50 transition-all"
                >
                  <svg className="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                  Back to Checklist
                </button>
                <button 
                  onClick={() => exportToWord(unitName, unitItems)}
                  disabled={unitItems.length === 0}
                  className={`flex items-center px-6 py-3 rounded-lg font-medium shadow-sm transition-all
                    ${unitItems.length > 0 
                      ? 'bg-eips-green hover:bg-opacity-90 text-white' 
                      : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
                >
                  <DownloadIcon />
                  Generate Unit Plan Template
                </button>
              </div>
            </div>

            <div className="space-y-6">
              {renderSection('Organising Ideas (OI)', categories.other)}
              {renderSection('Learning Outcomes (LO)', categories.goals)}
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {renderSection('Understandings (U)', categories.understandings)}
                {renderSection('Guiding Questions (GQ)', categories.questions)}
              </div>
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {renderSection('Knowledge (Students will know...)', categories.knows)}
                {renderSection('Skills & Procedures (Students will be skilled at...)', categories.skills)}
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-gray-50 font-sans text-gray-900 flex flex-col">
          <header className="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-20">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between h-16 items-center">
                <h1 className="text-xl font-bold text-eips-green flex items-center shrink-0">
                  <img src="EIPS_Vertical_RGB.png" alt="EIPS Logo" className="h-8 w-auto mr-3 object-contain" />
                  Curriculum Unit Planner
                </h1>
                <nav className="flex items-center space-x-2">
                  <button
                    onClick={() => handleTabClick('course')}
                    className={`whitespace-nowrap px-3 py-2 text-sm font-medium rounded-md transition-colors
                      ${activeTab === 'course' ? 'bg-eips-green/10 text-eips-green' : 'text-gray-600 hover:bg-gray-100'} cursor-pointer
                    `}
                  >
                    Course Selection
                  </button>
                  <button
                    onClick={() => handleTabClick('overview')}
                    className={`whitespace-nowrap px-3 py-2 text-sm font-medium rounded-md transition-colors
                      ${activeTab === 'overview' ? 'bg-eips-green/10 text-eips-green' : 'text-gray-600 hover:bg-gray-100'} cursor-pointer
                    `}
                  >
                    Curriculum Overview
                  </button>

                  {(loadedConfig && items.length > 0) && (
                    <>
                      <button
                        onClick={() => handleTabClick('checklist')}
                        className={`whitespace-nowrap px-3 py-2 text-sm font-medium rounded-md transition-colors
                          ${activeTab === 'checklist' ? 'bg-eips-green/10 text-eips-green' : 'text-gray-600 hover:bg-gray-100'} cursor-pointer
                        `}
                      >
                        Checklist
                      </button>

                      {/* Dropdown Navigation mapped to active units */}
                      <div className="relative flex items-center ml-2">
                         <select
                            value={activeTab.startsWith('u') ? activeTab : ''}
                            onChange={(e) => {
                              if (e.target.value) handleTabClick(e.target.value);
                            }}
                            className={`appearance-none bg-white border border-gray-300 text-gray-700 py-2 pl-4 pr-8 rounded-md text-sm font-medium focus:outline-none focus:ring-2 focus:ring-eips-green focus:border-eips-green cursor-pointer transition-colors ${activeTab.startsWith('u') ? 'bg-eips-green/10 text-eips-green border-eips-green/30' : 'hover:bg-gray-50'}`}
                         >
                            <option value="" disabled>View Unit Plan...</option>
                            {Array.from({length: loadedConfig.numUnits}, (_, i) => (
                               <option key={`opt-u${i+1}`} value={`u${i+1}`}>Unit {i+1} Overview</option>
                            ))}
                         </select>
                         <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                         </div>
                      </div>
                    </>
                  )}
                </nav>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-grow w-full">
            {/* Colour Legend displayed globally when data is loaded */}
            {items.length > 0 && activeTab !== 'course' && activeTab !== 'overview' && (
              <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-200 mb-6 flex flex-wrap items-center gap-x-6 gap-y-3 text-sm select-none">
                <strong className="text-gray-800 uppercase tracking-wide text-xs">Colour Legend:</strong>
                <div onClick={() => scrollToGroup('OI')} className="flex items-center cursor-pointer hover:opacity-70 transition-opacity" title="Click to scroll to OI"><span className="w-4 h-4 rounded bg-green-100 border border-green-300 mr-2"></span> Organizing Ideas (OI)</div>
                {activeGroups.map(num => {
                   const colorObj = colorPalette[(num - 1) % colorPalette.length];
                   return (
                     <div key={`legend-${num}`} onClick={() => scrollToGroup(num.toString())} className="flex items-center cursor-pointer hover:opacity-70 transition-opacity" title={`Click to scroll to LO.${num} / GQ.${num}`}>
                       <span className={`w-4 h-4 rounded ${colorObj.light} border ${colorObj.border} mr-2`}></span> LO.{num} / GQ.{num}
                     </div>
                   );
                })}
              </div>
            )}

            {activeTab === 'course' && renderCourseSelection()}
            {activeTab === 'overview' && renderOverview()}
            {activeTab === 'checklist' && items.length > 0 && renderChecklist()}
            
            {/* Render dynamic unit views */}
            {loadedConfig && Array.from({length: loadedConfig.numUnits}, (_, i) => i + 1).map(num => (
               activeTab === `u${num}` && items.length > 0 && <div key={`unit-${num}`}>{renderUnitView(num)}</div>
            ))}
          </main>

          <footer className="bg-white border-t border-gray-200 mt-auto py-6">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-500 text-sm">
              &copy; {new Date().getFullYear()} Elk Island Public Schools. All rights reserved.
            </div>
          </footer>

          {/* Load New Course Confirmation Modal */}
          {showCourseConfirm && (
            <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
              <div className="bg-white p-6 rounded-lg shadow-xl max-w-sm w-full mx-4">
                <div className="flex items-center mb-2">
                  <WarningIcon />
                  <h3 className="text-xl font-bold text-gray-900">Are you sure?</h3>
                </div>
                <p className="text-gray-600 mb-6">Loading a new course will discard all your current unit checklist selections. Proceed?</p>
                <div className="flex justify-end space-x-3">
                  <button 
                    onClick={() => setShowCourseConfirm(false)} 
                    className="px-4 py-2 bg-gray-200 text-gray-800 rounded-md font-medium hover:bg-gray-300 transition-colors"
                  >
                    Cancel
                  </button>
                  <button 
                    onClick={executeLoadCourse} 
                    className="px-4 py-2 bg-eips-green text-white rounded-md font-medium hover:bg-opacity-90 transition-colors"
                  >
                    Load New Course
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Unsaved Progress Modal */}
          {showSavePrompt && (
            <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
              <div className="bg-white p-6 rounded-lg shadow-xl max-w-md w-full mx-4">
                <div className="flex items-center mb-4">
                  <WarningIcon />
                  <h3 className="text-xl font-bold text-gray-900">Unsaved Changes</h3>
                </div>
                <p className="text-gray-600 mb-6">You have made changes to the checklist that haven't been saved. Would you like to save your progress before navigating away?</p>
                <div className="flex justify-end space-x-3">
                  <button 
                    onClick={() => { setShowSavePrompt(false); setPendingTab(null); }} 
                    className="px-4 py-2 bg-gray-100 text-gray-700 rounded-md font-medium hover:bg-gray-200 transition-colors"
                  >
                    Cancel
                  </button>
                  <button 
                    onClick={() => {
                      setActiveTab(pendingTab);
                      setShowSavePrompt(false);
                      setPendingTab(null);
                    }} 
                    className="px-4 py-2 bg-white border border-eips-orange text-eips-orange rounded-md font-medium hover:bg-orange-50 transition-colors"
                  >
                    Leave Without Saving
                  </button>
                  <button 
                    onClick={() => {
                      handleSaveProgress();
                      setActiveTab(pendingTab);
                      setShowSavePrompt(false);
                      setPendingTab(null);
                    }} 
                    className="px-4 py-2 bg-eips-green text-white rounded-md font-medium hover:bg-opacity-90 transition-colors"
                  >
                    Save & Continue
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Reset Confirmation Modal */}
          {showResetConfirm && (
            <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
              <div className="bg-white p-6 rounded-lg shadow-xl max-w-sm w-full mx-4">
                <h3 className="text-xl font-bold text-gray-900 mb-2">Are you sure?</h3>
                <p className="text-gray-600 mb-6">This will clear all unit selections from the checklist. This action cannot be undone.</p>
                <div className="flex justify-end space-x-3">
                  <button 
                    onClick={() => setShowResetConfirm(false)} 
                    className="px-4 py-2 bg-gray-200 text-gray-800 rounded-md font-medium hover:bg-gray-300 transition-colors"
                  >
                    No
                  </button>
                  <button 
                    onClick={handleReset} 
                    className="px-4 py-2 bg-eips-orange text-white rounded-md font-medium hover:bg-opacity-90 transition-colors"
                  >
                    Yes
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    /* Native scrollbar blocker on the flex container so we can construct a tailored UX component beneath it */
    .hide-native-scrollbar-x::-webkit-scrollbar:horizontal {
      height: 0px !important;
      display: none !important;
    }
    
    .custom-scrollbar-y::-webkit-scrollbar {
      width: 8px;
    }
    .custom-scrollbar-y::-webkit-scrollbar-track {
      background: #f1f1f1; 
    }
    .custom-scrollbar-y::-webkit-scrollbar-thumb {
      background: #cbd5e1; 
      border-radius: 4px;
    }
    .custom-scrollbar-y::-webkit-scrollbar-thumb:hover {
      background: #94a3b8; 
    }
    
    /* Custom scrollbar solely for our targeted horizontal tracker */
    .custom-scrollbar-x::-webkit-scrollbar {
      height: 12px;
    }
    .custom-scrollbar-x::-webkit-scrollbar-track {
      background: #f8fafc;
    }
    .custom-scrollbar-x::-webkit-scrollbar-thumb {
      background: #94a3b8; 
      border-radius: 6px;
      border: 3px solid #f8fafc;
    }
    .custom-scrollbar-x::-webkit-scrollbar-thumb:hover {
      background: #64748b; 
    }
  </style>
</body>
</html>
