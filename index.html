<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alberta Curriculum Unit Planner</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'eips-green': '#00957E',
            'eips-lime': '#A4D55F',
            'eips-orange': '#FF6B00'
          }
        }
      }
    }
  </script>
  
  <!-- React and ReactDOM for the interface -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel to compile the React code in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- HTML to DOCX Converter -->
  <script src="https://unpkg.com/html-docx-js@0.3.1/dist/html-docx.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // --- Gemini API Integration ---
    const generateGeminiContent = async (prompt, apiKey, expectJson = false) => {
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { 
          parts: [{ 
            text: "You are an expert Alberta curriculum planner and master teacher. Provide highly creative, practical, and pedagogical responses based on the Understanding by Design (UbD) framework. Pay careful attention to the verbs used in the Skills & Procedures (SP). The verbs indicate what students must be able to do. Ensure plans, activities, tasks, and evaluations accurately reflect these verbs. Ensure that success criteria ('I can' statements) serve as targets for students so that they know and understand what success looks like." 
          }] 
        }
      };

      if (expectJson) {
        payload.generationConfig = { responseMimeType: "application/json" };
      }

      const attemptFetch = async (modelName, keyToUse, retries = 2) => {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${keyToUse}`;
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          
          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData?.error?.message || `HTTP Error ${response.status}`);
          }
          
          const data = await response.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "No content generated.";
        } catch (error) {
          // Do not retry on terminal client errors like bad keys or hard quota locks
          const isTerminal = error.message.includes('API key not valid') || error.message.includes('unregistered caller');
          if (retries > 0 && !isTerminal) {
            await new Promise(resolve => setTimeout(resolve, 1500)); // 1.5s delay to clear brief rate limits
            return attemptFetch(modelName, keyToUse, retries - 1);
          }
          throw error;
        }
      };

      if (!apiKey || apiKey.trim() === '') {
        // --- ROUTE 1: Development Canvas Proxy ---
        try {
          return await attemptFetch('gemini-2.5-flash-preview-09-2025', "");
        } catch (err) {
          throw new Error(`Canvas Proxy Error: ${err.message}`);
        }
      } else {
        // --- ROUTE 2: Live Website Production ---
        // Hardcoded to the current stable model (gemini-2.5-flash)
        try {
          return await attemptFetch('gemini-2.5-flash', apiKey.trim());
        } catch (err) {
          throw new Error(`Google API Rejected: ${err.message}`);
        }
      }
    };

    // --- Utility Functions ---
    const parseLLMResponse = (text) => {
       try {
          const cleaned = text.replace(/```json/g, '').replace(/```/g, '').trim();
          const parsed = JSON.parse(cleaned);

          const normalize = (obj) => {
             if (obj === null || obj === undefined) return '';
             if (typeof obj === 'string') return obj;
             if (Array.isArray(obj)) return obj.map(item => normalize(item)).join('\n');
             if (typeof obj === 'object') {
                 return Object.entries(obj).map(([k, v]) => `${k}: ${normalize(v)}`).join('\n');
             }
             return String(obj);
          };

          if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
              if ('scenario' in parsed) parsed.scenario = normalize(parsed.scenario);
              if ('elements' in parsed) parsed.elements = normalize(parsed.elements);
              if ('evaluativeCriteria' in parsed) parsed.evaluativeCriteria = normalize(parsed.evaluativeCriteria);
              
              // New keys for Transfer Goals
              if ('alignmentCheck' in parsed) parsed.alignmentCheck = normalize(parsed.alignmentCheck);
              if ('goals' in parsed && Array.isArray(parsed.goals)) {
                  parsed.goals.forEach(g => {
                      if ('goal' in g) g.goal = normalize(g.goal);
                      if ('rationale' in g) g.rationale = normalize(g.rationale);
                  });
              }
          }

          if (Array.isArray(parsed)) {
             parsed.forEach(item => {
                 if ('title' in item) item.title = normalize(item.title);
                 if ('description' in item) item.description = normalize(item.description);
                 if ('kusps' in item) item.kusps = normalize(item.kusps);
                 if ('competencies' in item) item.competencies = normalize(item.competencies);
                 if ('successCriteria' in item) item.successCriteria = normalize(item.successCriteria);
                 
                 // Keys for Other Evidence & Self Assessment
                 if ('evaluativeCriteria' in item) item.evaluativeCriteria = normalize(item.evaluativeCriteria);
                 if ('evidence' in item) item.evidence = normalize(item.evidence);
                 if ('method' in item) item.method = normalize(item.method);
                 if ('assessmentType' in item) item.assessmentType = normalize(item.assessmentType);
                 if ('category' in item) item.category = normalize(item.category);
             });
          }

          return parsed;
       } catch (e) {
          throw new Error("Failed to parse the AI response format. Please try generating again.");
       }
    };

    function parseCSV(text) {
      const result = [];
      let cur = '';
      let inQuotes = false;
      let row = [];
      
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        if (char === '"' && text[i+1] === '"') {
          cur += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          row.push(cur);
          cur = '';
        } else if (char === '\n' && !inQuotes) {
          if (cur.endsWith('\r')) cur = cur.slice(0, -1);
          row.push(cur);
          result.push(row);
          row = [];
          cur = '';
        } else {
          cur += char;
        }
      }
      
      if (cur || row.length) {
        if (cur.endsWith('\r')) cur = cur.slice(0, -1);
        row.push(cur);
        result.push(row);
      }
      
      return result;
    }

    const getCategory = (code) => {
      if (!code) return 'other';
      const parts = code.toUpperCase().split('.');
      const hasU = parts.some(p => p === 'U' || /^U\d+/.test(p));
      const hasK = parts.some(p => p === 'K' || /^K\d+/.test(p));
      const hasSP = parts.some(p => p === 'SP' || /^SP\d+/.test(p));
      const hasLO = parts.some(p => p === 'LO' || /^LO\d+/.test(p));
      const hasGQ = parts.some(p => p === 'GQ' || /^GQ\d+/.test(p));

      if (hasK) return 'knows';
      if (hasSP) return 'skills';
      if (hasU) return 'understandings';
      if (hasLO) return 'goals';
      if (hasGQ) return 'questions';
      return 'other'; 
    };

    const colorPalette = [
      { light: 'bg-blue-100', hover: 'hover:bg-blue-200', border: 'border-blue-300' },
      { light: 'bg-orange-100', hover: 'hover:bg-orange-200', border: 'border-orange-300' },
      { light: 'bg-red-100', hover: 'hover:bg-red-200', border: 'border-red-300' },
      { light: 'bg-purple-100', hover: 'hover:bg-purple-200', border: 'border-purple-300' },
      { light: 'bg-yellow-100', hover: 'hover:bg-yellow-200', border: 'border-yellow-300' },
      { light: 'bg-teal-100', hover: 'hover:bg-teal-200', border: 'border-teal-300' },
      { light: 'bg-pink-100', hover: 'hover:bg-pink-200', border: 'border-pink-300' },
      { light: 'bg-indigo-100', hover: 'hover:bg-indigo-200', border: 'border-indigo-300' },
      { light: 'bg-cyan-100', hover: 'hover:bg-cyan-200', border: 'border-cyan-300' },
      { light: 'bg-lime-100', hover: 'hover:bg-lime-200', border: 'border-lime-300' },
      { light: 'bg-rose-100', hover: 'hover:bg-rose-200', border: 'border-rose-300' },
      { light: 'bg-emerald-100', hover: 'hover:bg-emerald-200', border: 'border-emerald-300' }
    ];

    const getCodeBgColor = (code, isHoverable = false) => {
      const upperCode = code.toUpperCase();
      const match = upperCode.match(/(?:LO|GQ)\.(\d+)/);
      if (match) {
         const num = parseInt(match[1], 10);
         const colorObj = colorPalette[(num - 1) % colorPalette.length];
         return isHoverable ? `${colorObj.light} ${colorObj.hover}` : colorObj.light;
      }
      if (!upperCode.includes('LO') && !upperCode.includes('GQ')) {
         return isHoverable ? 'bg-green-100 hover:bg-green-200' : 'bg-green-100';
      }
      return isHoverable ? 'bg-white hover:brightness-95' : 'bg-gray-50';
    };

    const getHierarchyBadgeColor = (prefix) => {
      switch(prefix) {
        case 'OI': return 'bg-green-100 text-green-800 border-green-300';
        case 'GQ': return 'bg-blue-100 text-blue-800 border-blue-300';
        case 'LO': return 'bg-gray-200 text-gray-800 border-gray-300';
        case 'U': return 'bg-purple-100 text-purple-800 border-purple-300';
        case 'K': return 'bg-yellow-100 text-yellow-800 border-yellow-300';
        case 'SP': return 'bg-orange-100 text-orange-800 border-orange-300';
        default: return 'bg-gray-100 text-gray-800 border-gray-300';
      }
    };

    const FormattedDescription = ({ text, className }) => {
      if (!text) return null;
      
      const renderBold = (str) => {
         if (!str) return str;
         const parts = str.split(/(\*\*.*?\*\*)/g);
         return parts.map((part, idx) => {
            if (part.startsWith('**') && part.endsWith('**')) {
               return <strong key={idx}>{part.slice(2, -2)}</strong>;
            }
            return part;
         });
      };

      const parts = text.split(/(?=(?:^|\s)- )/g);
      if (parts.length === 1) return <span className={className}>{renderBold(text)}</span>;
      return (
        <div className={className}>
          {parts.map((part, index) => {
            const trimmed = part.trimStart();
            if (trimmed.startsWith('- ')) {
              return (
                <div key={index} className="flex items-start mt-1 ml-5">
                  <span className="mr-2 text-eips-green font-bold">&bull;</span>
                  <span>{renderBold(trimmed.substring(2))}</span>
                </div>
              );
            }
            return <span key={index}>{renderBold(part)}</span>;
          })}
        </div>
      );
    };

    // NEW: Smart formatter for AI-generated text in the UI
    const FormattedAIText = ({ text, className }) => {
      if (!text) return null;
      const lines = text.split('\n');
      const elements = [];
      let currentList = [];
      let listType = null;

      const renderBold = (str) => {
         if (!str) return str;
         const parts = str.split(/(\*\*.*?\*\*)/g);
         return parts.map((part, idx) => {
            if (part.startsWith('**') && part.endsWith('**')) {
               return <strong key={idx}>{part.slice(2, -2)}</strong>;
            }
            return part;
         });
      };

      const pushList = (key) => {
        if (currentList.length > 0) {
          if (listType === 'ul') elements.push(<ul key={key} className="list-disc pl-5 my-2 space-y-1">{currentList}</ul>);
          if (listType === 'ol') elements.push(<ol key={key} className="list-decimal pl-5 my-2 space-y-1">{currentList}</ol>);
          currentList = [];
        }
      };

      lines.forEach((line, i) => {
        const trimmed = line.trim();
        const isBullet = trimmed.match(/^[-*]\s+(.*)/);
        const isNumber = trimmed.match(/^(\d+)\.\s+(.*)/);

        if (isBullet) {
          if (listType === 'ol') pushList(`list-${i}`);
          listType = 'ul';
          currentList.push(<li key={i}>{renderBold(isBullet[1])}</li>);
        } else if (isNumber) {
          if (listType === 'ul') pushList(`list-${i}`);
          listType = 'ol';
          currentList.push(<li key={i}>{renderBold(isNumber[2])}</li>);
        } else {
          pushList(`list-${i}`);
          if (trimmed !== '') {
            elements.push(<p key={`p-${i}`} className="mb-2 leading-relaxed">{renderBold(line)}</p>);
          }
        }
      });
      pushList('list-end');

      return <div className={`text-sm text-gray-800 ${className || ''}`}>{elements}</div>;
    };

    const exportToWord = (unitName, items, config, unitDataForExport) => {
      const categories = {
        understandings: items.filter(i => getCategory(i.code) === 'understandings'),
        knows: items.filter(i => getCategory(i.code) === 'knows'),
        skills: items.filter(i => getCategory(i.code) === 'skills'),
        goals: items.filter(i => getCategory(i.code) === 'goals'),
        other: items.filter(i => getCategory(i.code) === 'other'),
        questions: items.filter(i => getCategory(i.code) === 'questions'),
      };

      const tgList = unitDataForExport?.transferGoals || [];
      const pt = unitDataForExport?.performanceTask;
      const evList = unitDataForExport?.otherEvidence || [];
      const saList = unitDataForExport?.selfAssessments || [];
      const lessons = unitDataForExport?.lessons || [];

      const renderList = (list) => {
        if (!list || list.length === 0) return '<p><i>None selected</i></p>';
        return `<ul>${list.map(i => {
          let descHtml = i.desc.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
          const parts = descHtml.split(/(?=(?:^|\s)- )/g);
          if (parts.length > 1) {
            descHtml = parts.map(p => {
              const trimmed = p.trimStart();
              if (trimmed.startsWith('- ')) {
                return `<br>&nbsp;&nbsp;&nbsp;&nbsp;&#8226; ${trimmed.substring(2)}`;
              }
              return p;
            }).join('');
          }
          return `<li style="margin-bottom: 6px;"><strong>${i.code}</strong>: ${descHtml}</li>`;
        }).join('')}</ul>`;
      };

      // Robust text formatter for Word Document (handles line breaks and bullet points)
      const formatTextForWord = (text) => {
        if (!text) return '';
        const processedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        const lines = processedText.split('\n');
        let html = '';
        let inList = false;
        let listType = '';

        const closeList = () => {
          if (inList) {
            html += listType === 'ul' ? '</ul>' : '</ol>';
            inList = false;
          }
        };

        lines.forEach(line => {
          const trimmed = line.trim();
          if (!trimmed) {
             closeList();
             html += '<br>';
             return;
          }
          
          const isBullet = trimmed.match(/^[-*]\s+(.*)/);
          const isNumber = trimmed.match(/^(\d+)\.\s+(.*)/);

          if (isBullet) {
            if (inList && listType !== 'ul') closeList();
            if (!inList) { html += '<ul style="margin-top:0; margin-bottom:8px; padding-left:20px;">'; inList = true; listType = 'ul'; }
            html += `<li style="margin-bottom: 4px;">${isBullet[1]}</li>`;
          } else if (isNumber) {
            if (inList && listType !== 'ol') closeList();
            if (!inList) { html += '<ol style="margin-top:0; margin-bottom:8px; padding-left:20px;">'; inList = true; listType = 'ol'; }
            html += `<li style="margin-bottom: 4px;">${isNumber[2]}</li>`;
          } else {
            closeList();
            html += `<p style="margin-top:0; margin-bottom:8px;">${line}</p>`;
          }
        });
        closeList();
        return html;
      };

      const html = `
        <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head>
          <meta charset='utf-8'>
          <title>${unitName} Plan Template</title>
          <!--[if gte mso 9]>
          <xml>
            <w:WordDocument>
              <w:View>Print</w:View>
              <w:Zoom>100</w:Zoom>
              <w:DoNotOptimizeForBrowser/>
            </w:WordDocument>
          </xml>
          <![endif]-->
          <style>
            @page WordSection1 {
              size: 27.94cm 21.59cm;
              mso-page-orientation: landscape;
              margin: 1.5cm 1.5cm 1.5cm 1.5cm;
              mso-header-margin: 1.5cm;
              mso-footer-margin: 1.5cm;
              mso-paper-source: 0;
            }
            div.WordSection1 { page: WordSection1; }
            body { font-family: 'Calibri', 'Arial', sans-serif; font-size: 11pt; }
            table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
            th, td { border: 1px solid #000; padding: 12px; vertical-align: top; }
            th { background-color: #e2e8f0; text-align: left; font-size: 14pt; }
            h1 { text-align: center; color: #1e293b; font-size: 18pt; margin-bottom: 20px; }
            h2 { font-size: 12pt; margin-top: 0; color: #334155; border-bottom: 1px solid #cbd5e1; padding-bottom: 4px; }
            ul { margin-top: 8px; padding-left: 20px; }
            .meta-table th { background-color: #f8fafc; width: 20%; font-size: 12pt; }
            .meta-table td { width: 80%; }
            .instruction-text { background-color: #f8fafc; color: #475569; font-style: italic; }
          </style>
        </head>
        <body>
          <div class="WordSection1">
          <h1>Understanding by Design (UbD) Unit Plan</h1>
          <table class="meta-table">
            <tr><th>Title of Unit</th><td><strong>${unitName}</strong></td></tr>
            <tr><th>Grade Level</th><td><strong>${config && config.grade ? 'Grade ' + config.grade : ''}</strong></td></tr>
            <tr><th>Subject</th><td><strong>${config && config.subject ? config.subject : ''}</strong></td></tr>
            <tr><th>Time Frame</th><td><strong>${unitDataForExport?.timeframe || ''}</strong></td></tr>
            <tr><th>Developed By</th><td><strong>${unitDataForExport?.developedBy || ''}</strong></td></tr>
            <tr><th>Unit Overview</th><td>${unitDataForExport?.unitOverview ? formatTextForWord(unitDataForExport.unitOverview) : ''}</td></tr>
          </table>
          <table>
            <tr><th colspan="2">Stage 1 - Desired Results</th></tr>
            <tr>
              <td colspan="2">
                <h2>LEARNING OUTCOMES (LO)</h2>
                ${renderList(categories.goals)}
                ${categories.other.length > 0 ? `<h2 style="margin-top: 15px;">ORGANIZING IDEAS (OI)</h2>${renderList(categories.other)}` : ''}
              </td>
            </tr>
            <tr>
              <td style="width: 50%;"><h2>UNDERSTANDINGS</h2><p><i>Students will understand that...</i></p>${renderList(categories.understandings)}</td>
              <td style="width: 50%;"><h2>GUIDING QUESTIONS (GQ)</h2>${renderList(categories.questions)}</td>
            </tr>
            <tr>
              <td style="width: 50%;"><h2>KNOWLEDGE</h2><p><i>Students will know...</i></p>${renderList(categories.knows)}</td>
              <td style="width: 50%;"><h2>SKILLS & PROCEDURES</h2><p><i>Students will be able to...</i></p>${renderList(categories.skills)}</td>
            </tr>
            <tr>
              <td colspan="2">
                <h2>TRANSFER GOALS</h2>
                <p style="font-size: 10pt; color: #475569; font-style: italic; margin-bottom: 8px;">A transfer goal defines the long-term aim of a curriculum, specifying what students should be able to independently do with their acquired knowledge and skills in new, real-world situations long after the specific instruction has ended.</p>
                ${tgList.length > 0 ? `<ul>${tgList.map(g => `<li style="margin-bottom: 6px;">${formatTextForWord(g.goal)}</li>`).join('')}</ul>` : '<p><br><br><br></p>'}
              </td>
            </tr>
          </table>
          <table>
            <tr><th colspan="3">Stage 2 - Assessment Evidence</th></tr>
            <tr>
              <td colspan="3">
                <h2>Performance Task</h2>
                <p style="font-size: 10pt; color: #475569; font-style: italic; margin-bottom: 8px;">Through what authentic performance task will students demonstrate the desired understandings, knowledge, and skills? (describes the learning activity in “story” form. Typically, the P.T. describes a scenario or situation that requires students to apply knowledge and skills to demonstrate their understanding in a real life situation. Describe your performance task scenario below. By what criteria will performances of understanding be judged?</p>
                ${pt ? formatTextForWord(pt.scenario) : '<br><br><br>'}
              </td>
            </tr>
            <tr>
              <td style="width: 33.33%;"><strong>Evaluative Criteria</strong><br><br>${pt ? formatTextForWord(pt.evaluativeCriteria) : '<br><br><br><br>'}</td>
              <td colspan="2" style="width: 66.66%;"><strong>Elements of the Performance Task</strong><br><br>${pt ? formatTextForWord(pt.elements) : '<br><br><br><br>'}</td>
            </tr>
            <tr>
              <td colspan="3">
                <h2>Other Evidence</h2>
                <p style="font-size: 10pt; color: #475569; font-style: italic; margin-bottom: 8px;">Through what other evidence (work samples, observations, quizzes, tests, journals or other means) will students demonstrate achievement of the desired results? Formative and summative assessments used throughout the unit to arrive at the outcomes.</p>
              </td>
            </tr>
            <tr>
              <td style="width: 25%; background-color: #f8fafc;"><strong>Evaluative Criteria</strong></td>
              <td style="width: 60%; background-color: #f8fafc;"><strong>Evidence</strong></td>
              <td style="width: 15%; background-color: #f8fafc; text-align: center;"><strong>COP</strong></td>
            </tr>
            ${evList.length > 0 ? evList.map(e => `
              <tr>
                <td style="width: 25%;"><strong>${e.title}</strong><br><br>${formatTextForWord(e.evaluativeCriteria)}</td>
                <td style="width: 60%;"><b>[${e.assessmentType}]</b><br>${formatTextForWord(e.evidence)}</td>
                <td style="width: 15%; text-align: center;">${e.method}</td>
              </tr>
            `).join('') : `
              <tr>
                <td style="width: 25%;"><br><br><br><br></td>
                <td style="width: 60%;"><br><br><br><br></td>
                <td style="width: 15%;"><br><br><br><br></td>
              </tr>
            `}
            <tr>
              <td colspan="3">
                 <h2>Student Self-Assessment</h2>
                 <p style="font-size: 10pt; color: #475569; font-style: italic; margin-bottom: 8px;">How will students reflect upon or self-assess their learning?</p>
                 ${saList.length > 0 ? `<ul>${saList.map(sa => `<li style="margin-bottom: 6px;"><strong>[${sa.category}] ${formatTextForWord(sa.title)}</strong><br>${formatTextForWord(sa.description)}</li>`).join('')}</ul>` : '<br><br><br><br><br>'}
              </td>
            </tr>
          </table>
          <table>
            <tr><th colspan="7">Stage 3 - Learning Plan</th></tr>
            <tr>
              <td colspan="7" class="instruction-text">
                <p>What teaching and learning experiences will you use to:</p>
                <ul><li>achieve the desired results identified in Stage 1?</li><li>equip students to complete the assessment tasks identified in Stage 2?</li></ul>
              </td>
            </tr>
            <tr><td colspan="7"><br><br><br><br><br><br></td></tr>
            <tr>
              <td colspan="7" class="instruction-text">
                <p style="margin-bottom: 8px;">Where are your students headed? Where have they been? How will you make sure the students know where they are going?</p>

      const executeLoadCourse = async () => {

          const res = await fetch(fileName);
          if (!res.ok) throw new Error(`Could not find file: ${fileName}. Please ensure it is saved in the same directory as this index file.`);
          const text = await res.text();
          const parsed = parseCSV(text);
          
          let lastUReplacement = 'U.1';

          const data = parsed.slice(1)
            .filter(r => r.length > 1 && r[0])
            .map((r, index) => {
              let code = r[0].trim();
              const upperCode = code.toUpperCase();
              
              const isLO = /(?:^|\.)LO\.\d+(?:$|\.)/.test(upperCode) && !/(?:^|\.)U\.\d+/.test(upperCode) && !/(?:^|\.)K\.\d+/.test(upperCode) && !/(?:^|\.)SP\.\d+/.test(upperCode);

              const isK = /(?:^|\.)K\.\d+(?:$|\.)/.test(upperCode);
              const isSP = /(?:^|\.)SP\.\d+(?:$|\.)/.test(upperCode);

              if (isLO) lastUReplacement = 'U.1'; 
              if (isU) {
                const uMatch = upperCode.match(/U\.\d+/);
                if (uMatch) lastUReplacement = uMatch[0];
              }

              if ((isK || isSP) && !/(?:^|\.)U\.\d+/.test(upperCode)) {
                code = code.replace(/(K\.\d+|SP\.\d+)/i, `${lastUReplacement}.$1`);

              const item = {

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const text = evt.target.result;
            const parsed = parseCSV(text);
            
            let lastUReplacement = 'U.1';

            const data = parsed.slice(1)
              .filter(r => r.length > 1 && r[0])
              .map((r, index) => {
                let code = r[0].trim();
                const upperCode = code.toUpperCase();
                
                const isLO = /(?:^|\.)LO\.\d+(?:$|\.)/.test(upperCode) && !/(?:^|\.)U\.\d+/.test(upperCode) && !/(?:^|\.)K\.\d+/.test(upperCode) && !/(?:^|\.)SP\.\d+/.test(upperCode);
                const isU = /(?:^|\.)U\.\d+(?:$|\.)/.test(upperCode);
                const isK = /(?:^|\.)K\.\d+(?:$|\.)/.test(upperCode);
                const isSP = /(?:^|\.)SP\.\d+(?:$|\.)/.test(upperCode);

                if (isLO) lastUReplacement = 'U.1'; 
                if (isU) {
                  const uMatch = upperCode.match(/U\.\d+/);
                  if (uMatch) lastUReplacement = uMatch[0];
                }

                if ((isK || isSP) && !/(?:^|\.)U\.\d+/.test(upperCode)) {
                  code = code.replace(/(K\.\d+|SP\.\d+)/i, `${lastUReplacement}.$1`);
                }

                const item = {
                  id: index,
                  code: code,
                  desc: r[1] ? r[1].replace(/\n/g, ' ') : ''
                };
                for(let i = 1; i <= appConfig.numUnits; i++) {
                  item[`u${i}`] = false;
                }
                return item;
              });
              
            setItems(data);
            setLoadedConfig(appConfig);
            setActiveTab('checklist');

            setLoadError('Error parsing manual file: ' + err.message);
          } finally {
            setLoadingData(false);

          setLoadError('Failed to read file.');
          setLoadingData(false);

        reader.readAsText(file);
        e.target.value = null;

      const handleTableScroll = (e) => {
        if (scrollRef.current && scrollRef.current.scrollLeft !== e.target.scrollLeft) {
          scrollRef.current.scrollLeft = e.target.scrollLeft;

      };

      const handleFakeScroll = (e) => {

        }
      };

      const toggleUnit = (id, unitField) => {
        const toggledItem = items.find(i => i.id === id);
        if (!toggledItem) return;

        const newState = !toggledItem[unitField];
        const code = toggledItem.code;
        const cat = getCategory(code);
        
        let partnerMatchFn = null;
        let parentMatchFns = [];
        
        const numMatch = code.match(/(?:LO|GQ)\.(\d+)/);
        if (numMatch && (cat === 'goals' || cat === 'questions')) {
           const num = numMatch[1];
           if (cat === 'goals') {
              const regex = new RegExp(`(?:^|\\.)GQ\\.${num}(?:$|\\.)`);
              partnerMatchFn = (i) => getCategory(i.code) === 'questions' && regex.test(i.code);
           } else {
              const regex = new RegExp(`(?:^|\\.)LO\\.${num}(?:$|\\.)`);
              partnerMatchFn = (i) => getCategory(i.code) === 'goals' && regex.test(i.code);
           }
        }

        const isChild = cat === 'understandings' || cat === 'knows' || cat === 'skills';
        if (newState === true && isChild) {
           const oiMatch = code.match(/(.*?OI\.\d+)/);
           if (oiMatch) parentMatchFns.push((i) => i.code === oiMatch[1]);
           const gqMatch = code.match(/(.*?GQ\.\d+)/);
           if (gqMatch) parentMatchFns.push((i) => i.code === gqMatch[1]);
           const loMatch = code.match(/(.*?LO\.\d+)/);
           if (loMatch) parentMatchFns.push((i) => i.code === loMatch[1]);
           const uMatch = code.match(/(.*?U\.\d+)/);
           if (uMatch && (cat === 'knows' || cat === 'skills')) {
              parentMatchFns.push((i) => i.code === uMatch[1]);
           }
        }

        setItems(prevItems => prevItems.map(item => {
          let updatedItem = { ...item };
          let changed = false;

          if (item.id === id) {
            updatedItem[unitField] = newState;
            changed = true;
          } else if (partnerMatchFn && partnerMatchFn(item)) {
            updatedItem[unitField] = newState;
            changed = true;
          }
          
          if (newState === true && parentMatchFns.some(fn => fn(item))) {
            updatedItem[unitField] = true;
            changed = true;
          }

          return changed ? updatedItem : item;
        }));

      const handleGenerateTransferGoals = async (unitItems, unitNum) => {
        if (!apiKey) return;
        setActiveAiTool(null);
        setLlmModal({ isOpen: true, type: 'transfer', unitNum, selectedIndices: [], title: 'Brainstorming Transfer Goals...', content: null, isLoading: true, error: '' });
        
        const context = buildPromptContext(unitItems);
        let prompt = `${context}\n\nYou are an expert Curriculum Designer specializing in Grant Wiggins and Jay McTighe's Understanding by Design (UbD) framework. Your task is to analyze the provided list of curricular outcomes or standards and generate a selection of high-quality Transfer Goals.\n\nContext: What is a Transfer Goal?\nIn the UbD framework, a transfer goal defines the long-term aim of a curriculum. It specifies what students should be able to independently do with their acquired knowledge and skills in new, novel, and real-world situations long after specific instruction has ended.\n\nRules for Generating Transfer Goals:\n1. Format: Every transfer goal MUST begin with the exact phrase: "Students will be able to independently use their learning to..."\n2. Autonomy: The goal must focus on independent application, without teacher prompting or scaffolding.\n3. Real-World Application: The goal must apply to messy, complex, real-world situations outside the classroom, not just academic tests or isolated school tasks.\n4. Novelty: The goal must require students to adapt and apply their learning to new situations they haven't explicitly encountered in the lessons.\n5. Synthesis: Do not simply rewrite the individual curricular outcomes. Synthesize the provided outcomes into broader, overarching purposes.\n6. Quantity: Provide 3 to 5 distinct transfer goal options for the teacher to choose from.`;
        
        if (customInstruction.trim()) prompt += `\n\nADDITIONAL INSTRUCTIONS FROM TEACHER:\n${customInstruction.trim()}`;
        
        prompt += `\n\nYou MUST return ONLY a valid JSON object with exactly two keys:\n- "alignmentCheck": A brief, 2-3 sentence string summarizing the core concepts you identified from the provided outcomes that informed these transfer goals.\n- "goals": An array of 3 to 5 objects. Each object must have exactly these string keys:\n  - "goal": The transfer goal string (starting with "Students will be able to independently use their learning to...").\n  - "rationale": A 1-2 sentence string explaining how this goal synthesizes the provided outcomes and applies to the real world.`;

        try {
          const response = await generateGeminiContent(prompt, apiKey, true);
          const parsedData = parseLLMResponse(response);
          setLlmModal(prev => ({ ...prev, title: 'Transfer Goal Ideas', content: parsedData, isLoading: false }));
        } catch (err) {
          setLlmModal(prev => ({ ...prev, title: 'Generation Failed', error: err.message, isLoading: false }));
        }
      };

      const handleGeneratePerformanceTask = async (unitItems, unitNum) => {

             if (num) {
                const fullCode = `${prefix}.${num}`;
                if (prefix === 'OI') groups.OI.add(fullCode);
                if (prefix === 'GQ') groups.GQ.add(fullCode);

          }

              <div className="flex bg-gray-50 border-t border-gray-200 shrink-0 relative z-50">

            </div>

      };

      const renderUnitView = (unitNum) => {
        const unitField = `u${unitNum}`;
        const unitItems = items.filter(item => item[unitField]);
        const currentUnitData = unitData[unitNum] || {};
        const unitName = currentUnitData.title ? `Unit ${unitNum} - ${currentUnitData.title}` : `Unit ${unitNum}`;

        const categories = {

          skills: unitItems.filter(i => getCategory(i.code) === 'skills'),

                                {badge.fullText}
                              </button>
                           ))}

                      </div>
                    </li>

                        <li>In the box that pops up, click the <strong>Create API key in new project</strong> button.</li>
                        <li>Wait a few seconds for the system to create a long password made of letters and numbers (this is your API key), then click <strong>Copy</strong> next to it.</li>
                        <li>Come back to this unit planner page, paste that password into the box above, and click <strong>Save Key</strong>.</li>

                    </div>

                </div>
              ) : !activeAiTool ? (
                <>
                  <p className="text-sm text-indigo-700 mb-4">Use your selected curriculum items to automatically generate targeted materials for your unit.</p>

                    <button onClick={() => { setActiveAiTool('transfer'); setCustomInstruction(''); }} disabled={unitItems.length === 0} className={`flex items-center px-4 py-2 rounded-md text-sm font-bold shadow-sm transition-colors ${unitItems.length > 0 ? 'bg-white border border-indigo-200 text-indigo-700 hover:bg-indigo-50' : 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed'}`}>
                      <SparkleIcon /> Brainstorm Transfer Goals (Stage 1)
                    </button>
                    <button onClick={() => { setActiveAiTool('pt'); setCustomInstruction(''); }} disabled={unitItems.length === 0} className={`flex items-center px-4 py-2 rounded-md text-sm font-bold shadow-sm transition-colors ${unitItems.length > 0 ? 'bg-white border border-indigo-200 text-indigo-700 hover:bg-indigo-50' : 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed'}`}>
                      <SparkleIcon /> Draft Performance Task (Stage 2)

                    <button onClick={() => { setActiveAiTool('evidence'); setCustomInstruction(''); }} disabled={unitItems.length === 0} className={`flex items-center px-4 py-2 rounded-md text-sm font-bold shadow-sm transition-colors ${unitItems.length > 0 ? 'bg-white border border-indigo-200 text-indigo-700 hover:bg-indigo-50' : 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed'}`}>
                      <SparkleIcon /> Brainstorm Other Evidence (Stage 2)
                    </button>
                    <button onClick={() => { setActiveAiTool('selfAssessment'); setCustomInstruction(''); }} disabled={unitItems.length === 0} className={`flex items-center px-4 py-2 rounded-md text-sm font-bold shadow-sm transition-colors ${unitItems.length > 0 ? 'bg-white border border-indigo-200 text-indigo-700 hover:bg-indigo-50' : 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed'}`}>
                      <SparkleIcon /> Brainstorm Self-Assessments (Stage 2)
                    </button>
                    <button onClick={() => { setActiveAiTool('lessons'); setCustomInstruction(''); }} disabled={unitItems.length === 0} className={`flex items-center px-4 py-2 rounded-md text-sm font-bold shadow-sm transition-colors ${unitItems.length > 0 ? 'bg-white border border-indigo-200 text-indigo-700 hover:bg-indigo-50' : 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed'}`}>

                  </div>

                <div className="bg-white p-5 rounded-md border border-indigo-100 shadow-sm mt-3 transition-all animate-fade-in">
                  <div className="flex justify-between items-center mb-3 pb-2 border-b border-gray-100">
                    <h4 className="font-bold text-indigo-900 flex items-center text-base">
                      <SparkleIcon />

                    </h4>
                    <button onClick={() => setActiveAiTool(null)} className="text-xs font-medium text-gray-500 hover:text-gray-800 transition-colors flex items-center">
                      <svg className="w-4 h-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg> Back
                    </button>

                  <label className="block text-sm font-bold text-gray-800 mb-1">Optional Custom Instructions:</label>

                    <strong className="text-gray-800">Example:</strong> 
                    <span className="italic">
                      {activeAiTool === 'pt' 
                        ? ' "Make the scenario about surviving a zombie apocalypse," or "Ensure the final product is a recorded podcast script."' 
                        : activeAiTool === 'evidence'
                        ? ' "Focus heavily on formative observations," or "Include peer-feedback conversation prompts."'
                        : activeAiTool === 'transfer'
                        ? ' "Focus specifically on environmental stewardship," or "Ensure they are relevant to a rural farming community."'
                        : activeAiTool === 'selfAssessment'
                        ? ' "Include strategies suitable for young readers," or "Focus on peer-to-peer reflections."'
                        : ' "Focus on outdoor, nature-based activities," or "Ensure these lessons do not require any digital technology."'}
                    </span>
                  </p>
                  <textarea className="w-full border border-gray-300 rounded-md p-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 mb-4 shadow-sm" rows="3" placeholder="Enter your custom instructions here (optional)..." value={customInstruction} onChange={(e) => setCustomInstruction(e.target.value)}></textarea>
                  <div className="flex justify-end">
                    <button onClick={() => { 
                      if (activeAiTool === 'pt') handleGeneratePerformanceTask(unitItems, unitNum); 
                      else if (activeAiTool === 'evidence') handleGenerateOtherEvidence(unitItems, unitNum);
                      else if (activeAiTool === 'transfer') handleGenerateTransferGoals(unitItems, unitNum);
                      else if (activeAiTool === 'selfAssessment') handleGenerateSelfAssessment(unitItems, unitNum);
                      else handleGenerateLessonIdeas(unitItems, unitNum); 
                    }} className="px-6 py-2.5 bg-indigo-600 text-white rounded-md text-sm font-bold shadow-md hover:bg-indigo-700 transition-colors">Generate Content</button>
                  </div>
                </div>
              )}

              {apiKey && (
                <div className="mt-5 pt-4 border-t border-indigo-200/60 flex items-start text-xs text-indigo-800/80 leading-relaxed">
                  <svg className="w-4 h-4 mr-2 flex-shrink-0 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                  <p>

                  </p>
                </div>
              )}
            </div>

            <div className="space-y-6">
              {renderSection('Organising Ideas (OI)', categories.other)}
              {renderSection('Learning Outcomes (LO)', categories.goals)}
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {renderSection('Understandings (U)', categories.understandings)}
                {renderSection('Guiding Questions (GQ)', categories.questions)}
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {renderSection('Knowledge (Students will know...)', categories.knows)}
                {renderSection('Skills & Procedures (Students will be able to...)', categories.skills)}
              </div>
            </div>

            {((currentUnitData.transferGoals && currentUnitData.transferGoals.length > 0) || currentUnitData.performanceTask || (currentUnitData.otherEvidence && currentUnitData.otherEvidence.length > 0) || (currentUnitData.selfAssessments && currentUnitData.selfAssessments.length > 0) || (currentUnitData.lessons && currentUnitData.lessons.length > 0)) && (

                     const colorObj = colorPalette[(num - 1) % colorPalette.length];
                     return (
                       <div key={`legend-${num}`} onClick={() => scrollToGroup(num.toString())} className="flex items-center cursor-pointer hover:opacity-70 transition-opacity" title={`Click to scroll to LO.${num} / GQ.${num}`}>
                         <span className={`w-4 h-4 rounded ${colorObj.light} border ${colorObj.border} mr-2`}></span> LO.{num} / GQ.{num}
                       </div>
                     );
                  })}
                </div>
              </div>
            )}
            {activeTab === 'course' && renderCourseSelection()}
            {activeTab === 'overview' && renderOverview()}
            {activeTab === 'how-to' && renderHowToUse()}
            {activeTab === 'checklist' && items.length > 0 && renderChecklist()}
            {loadedConfig && Array.from({length: loadedConfig.numUnits}, (_, i) => i + 1).map(num => (
               activeTab === `u${num}` && items.length > 0 && <div key={`unit-${num}`}>{renderUnitView(num)}</div>
            ))}

              <img src="https://mirrors.creativecommons.org/presskit/icons/by.svg" alt="" style={{ maxWidth: '1em', maxHeight: '1em', marginLeft: '.2em' }} />
              <img src="https://mirrors.creativecommons.org/presskit/icons/nc.svg" alt="" style={{ maxWidth: '1em', maxHeight: '1em', marginLeft: '.2em' }} />
              <img src="https://mirrors.creativecommons.org/presskit/icons/sa.svg" alt="" style={{ maxWidth: '1em', maxHeight: '1em', marginLeft: '.2em' }} />
            </div>
          </footer>

          {llmModal.isOpen && (

                  ) : llmModal.error ? (
                    <span className="text-red-600">{llmModal.error}</span>

                    <>
                      {llmModal.type === 'pt' && llmModal.content && (
                        <div>

                           <FormattedAIText text={llmModal.content.scenario} />
                           <h4 className="font-bold text-indigo-900 mb-1 mt-4">Elements</h4>
                           <FormattedAIText text={llmModal.content.elements} />
                           <h4 className="font-bold text-indigo-900 mb-1 mt-4">Evaluative Criteria</h4>
                           <FormattedAIText text={llmModal.content.evaluativeCriteria} />
                        </div>
                      )}
                      
                      {llmModal.type === 'transfer' && llmModal.content && llmModal.content.goals && (
                        <div className="space-y-4">
                           <div className="bg-blue-50 p-3 rounded-md border border-blue-200">
                              <h4 className="font-bold text-blue-900 text-sm">Alignment Check</h4>
                              <p className="text-sm text-blue-800">{llmModal.content.alignmentCheck}</p>
                           </div>
                           <p className="text-sm text-gray-600 mb-2 italic">Select the Transfer Goals you want to keep:</p>
                           <div className="space-y-3">
                           {llmModal.content.goals.map((g, idx) => (
                               <label key={idx} className={`flex items-start gap-3 p-3 border rounded-lg cursor-pointer transition-colors ${llmModal.selectedIndices.includes(idx) ? 'bg-indigo-50 border-indigo-300' : 'bg-white hover:bg-gray-50'}`}>

                                     <h4 className="font-bold text-indigo-900 text-base">{g.goal}</h4>
                                     <div className="mt-2 text-sm text-gray-800"><b>Rationale:</b> <FormattedAIText text={g.rationale} /></div>
                                  </div>
                               </label>
                           ))}

                      {llmModal.type === 'evidence' && Array.isArray(llmModal.content) && (
                        <div className="space-y-3">

                                  <input type="checkbox" className="mt-1 flex-shrink-0 w-5 h-5 text-indigo-600 rounded-full border-gray-300 focus:ring-indigo-500" checked={llmModal.selectedIndices.includes(idx)} onChange={() => handleSelectCheckboxItem(idx)} />
                                  <div className="flex-1">
                                     <h4 className="font-bold text-indigo-900 text-base">{ev.title}</h4>
                                     <div className="flex items-center gap-2 mb-2 mt-1">

                                     <div><b className="text-xs text-gray-600 block mb-1">Evaluative Criteria:</b> <FormattedAIText text={ev.evaluativeCriteria} /></div>

                                  <input type="checkbox" className="mt-1 flex-shrink-0 w-5 h-5 text-indigo-600 rounded-full border-gray-300 focus:ring-indigo-500" checked={llmModal.selectedIndices.includes(idx)} onChange={() => handleSelectCheckboxItem(idx)} />

                                     <h4 className="font-bold text-indigo-900 text-base">{sa.title}</h4>

                               </label>

                               <label key={idx} className={`flex items-start gap-3 p-3 border rounded-lg cursor-pointer transition-colors ${llmModal.selectedIndices.includes(idx) ? 'bg-indigo-50 border-indigo-300' : 'bg-white hover:bg-gray-50'}`}>
                                  <input type="checkbox" className="mt-1 flex-shrink-0 w-5 h-5 text-indigo-600 rounded-full border-gray-300 focus:ring-indigo-500" checked={llmModal.selectedIndices.includes(idx)} onChange={() => handleSelectCheckboxItem(idx)} />

                                     <h4 className="font-bold text-indigo-900 text-base">{lesson.title}</h4>
                                     <div className="mb-2"><FormattedAIText text={lesson.description} /></div>
                                     <p className="text-xs text-gray-600 mb-1"><b>KUSPs:</b> {lesson.kusps}</p>
                                     <p className="text-xs text-gray-600 mb-1"><b>Competencies:</b> {lesson.competencies}</p>
                                     <p className="text-xs text-gray-600"><b>Success Criteria:</b> {lesson.successCriteria}</p>
                                  </div>
                               </label>
                           ))}
                        </div>
                      )}
                    </>
                  )}
                </div>
                <div className="flex justify-end space-x-3 pt-2">
                  <button onClick={() => setLlmModal({ ...llmModal, isOpen: false })} className="px-4 py-2 bg-gray-100 text-gray-700 rounded-md font-medium hover:bg-gray-200 transition-colors">Close</button>

                    <>
                      <button onClick={handleAddToTemplate} disabled={(llmModal.type === 'lessons' || llmModal.type === 'evidence' || llmModal.type === 'transfer' || llmModal.type === 'selfAssessment') && llmModal.selectedIndices.length === 0} className={`px-4 py-2 rounded-md font-medium shadow-sm transition-colors ${(llmModal.type === 'lessons' || llmModal.type === 'evidence' || llmModal.type === 'transfer' || llmModal.type === 'selfAssessment') && llmModal.selectedIndices.length === 0 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-indigo-100 text-indigo-700 border border-indigo-200 hover:bg-indigo-200'}`}>Add to Lesson Template</button>
                      <button onClick={copyLlmContent} className="px-4 py-2 bg-indigo-600 text-white rounded-md font-medium shadow-sm hover:bg-indigo-700 transition-colors">Copy to Clipboard</button>
                    </>
                  )}
                </div>
              </div>
            </div>
          )}

          {showCourseConfirm && (
            <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
              <div className="bg-white p-6 rounded-lg shadow-xl max-w-sm w-full mx-4">
                <div className="flex items-center mb-2"><WarningIcon /><h3 className="text-xl font-bold text-gray-900">Are you sure?</h3></div>
                <p className="text-gray-600 mb-6">Loading a new course will discard all your current unit checklist selections. Proceed?</p>

                </div>
              </div>
            </div>
          )}

          {showSavePrompt && (
            <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
              <div className="bg-white p-6 rounded-lg shadow-xl max-w-md w-full mx-4">
                <div className="flex items-center mb-4"><WarningIcon /><h3 className="text-xl font-bold text-gray-900">Unsaved Changes</h3></div>
                <p className="text-gray-600 mb-6">You have made changes to the checklist that haven't been saved. Would you like to save your progress before navigating away?</p>
                <div className="flex justify-end space-x-3">
                  <button onClick={() => { setShowSavePrompt(false); setPendingTab(null); }} className="px-4 py-2 bg-gray-100 text-gray-700 rounded-md font-medium hover:bg-gray-200 transition-colors">Cancel</button>
                  <button onClick={() => { setActiveTab(pendingTab); setShowSavePrompt(false); setPendingTab(null); }} className="px-4 py-2 bg-white border border-eips-orange text-eips-orange rounded-md font-medium hover:bg-orange-50 transition-colors">Leave Without Saving</button>
                  <button onClick={() => { handleSaveProgress(); setActiveTab(pendingTab); setShowSavePrompt(false); setPendingTab(null); }} className="px-4 py-2 bg-eips-green text-white rounded-md font-medium hover:bg-opacity-90 transition-colors">Save & Continue</button>

            <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">

                <p className="text-gray-600 mb-6">This will clear all unit selections from the checklist. This action cannot be undone.</p>
                <div className="flex justify-end space-x-3">
                  <button onClick={() => setShowResetConfirm(false)} className="px-4 py-2 bg-gray-200 text-gray-800 rounded-md font-medium hover:bg-gray-300 transition-colors">No</button>
                  <button onClick={handleReset} className="px-4 py-2 bg-eips-orange text-white rounded-md font-medium hover:bg-opacity-90 transition-colors">Yes</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

    /* Native scrollbar blocker on the flex container so we can construct a tailored UX component beneath it */
