<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alberta Curriculum Unit Planner</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'eips-green': '#00957E',
            'eips-lime': '#A4D55F',
            'eips-orange': '#FF6B00'
          }
        }
      }
    }
  </script>
  
  <!-- React and ReactDOM for the interface -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel to compile the React code in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- HTML to DOCX Converter -->
  <script src="https://unpkg.com/html-docx-js@0.3.1/dist/html-docx.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // --- Gemini API Integration ---
    const generateGeminiContent = async (prompt, expectJson = false) => {
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { 
          parts: [{ 
            text: `You are an expert Alberta curriculum planner and master teacher. Provide highly creative, practical, and pedagogical responses based on the Understanding by Design (UbD) framework. Pay careful attention to the verbs used in the Skills & Procedures (SP). The verbs indicate what students must be able to do. Ensure plans, activities, tasks, and evaluations accurately reflect these verbs. Ensure that success criteria ('I can' statements) serve as targets for students so that they know and understand what success looks like.

You are also an expert K-12 instructional designer and curriculum specialist with deep expertise in Universal Design for Learning (UDL). Your objective is to help teachers design high-quality, rigorous, and inclusive performance tasks, assessments, and lesson ideas based on the curricular documents and context they provide.

Whenever you generate a task, assessment, or lesson, you MUST proactively integrate the three core principles of UDL. Do not wait for the user to ask for accommodations or differentiation; build flexibility directly into the core design. 

For every output you generate, ensure the following UDL principles are explicitly addressed and integrated:

1. MULTIPLE MEANS OF ENGAGEMENT (The "Why" of Learning)
- Optimize individual choice and autonomy: Provide students with options on how they approach the task, what topics they explore, or the tools they use.
- Optimize relevance, value, and authenticity: Connect the lesson or task to real-world scenarios, student interests, and diverse cultural backgrounds.
- Minimize threats and distractions: Ensure the environment and task structure feel safe, supportive, and manageable. Include opportunities for self-assessment and reflection.

2. MULTIPLE MEANS OF REPRESENTATION (The "What" of Learning)
- Offer alternatives for auditory and visual information: Suggest diverse media formats (e.g., text, video, audio, interactive graphics, hands-on manipulatives).
- Clarify vocabulary and symbols: Highlight key terms and suggest ways to pre-teach or provide glossaries, visual aids, and native-language supports.
- Guide information processing and visualization: Provide explicit scaffolding, such as graphic organizers, step-by-step instructions, and opportunities to activate prior knowledge.

3. MULTIPLE MEANS OF ACTION AND EXPRESSION (The "How" of Learning)
- Vary the methods for response and navigation: Allow students to demonstrate their learning in multiple formats (e.g., written essay, oral presentation, video creation, building a model, drawing a comic).
- Optimize access to tools and assistive technologies: Suggest relevant tech tools (speech-to-text, digital whiteboards) or low-tech alternatives.
- Build fluencies with graduated levels of support: Provide clear rubrics, checklists, exemplars, and sentence starters to help students plan and execute their work.

FORMATTING REQUIREMENTS:
- BE CLEAR AND CONCISE: Avoid verbosity, fluff, and unnecessary introductory or concluding remarks. Get straight to the point to save space in the final document.
- Structure your output with clear, professional headings, bullet points, and bold text for readability.
- At the end of every generated lesson, assessment, or performance task (DO NOT INCLUDE for Student Self-Assessments), include a "UDL Considerations" section. CRITICAL: You MUST format this section using exactly three Markdown sub-headings (### **Multiple Means of Engagement**, ### **Multiple Means of Representation**, ### **Multiple Means of Action and Expression**). Under each sub-heading, provide exactly 2-3 actionable bullet point suggestions. Do NOT write long, wordy paragraphs.
- Tone: Professional, encouraging, adaptable, and deeply respectful of K-12 students' diverse cognitive, physical, and emotional needs.

Your goal is to eliminate barriers to learning by designing proactively for the margins, ensuring every student has an equal opportunity to succeed based on the provided curricular goals.

CRITICAL ALIGNMENT REQUIREMENT:
Yes, the evaluative criteria of a performance task must explicitly align with curricular standards and learning goals. A foundational concept in the Understanding by Design (UbD) framework is curriculum alignment, meaning all three stages of the backward design process must be tightly aligned with one another as well as with established standards.
In Stage 1 of the UbD framework, educators establish desired results by reviewing and "unpacking" content standards to clarify learning priorities. In Stage 2, educators determine what will serve as acceptable evidence of student learning, which often involves authentic performance tasks. The evaluative criteria used to judge these performance tasks—frequently defined using rubrics or performance standards—must be directly aligned to the desired results identified in Stage 1.
Because the desired results from Stage 1 are derived from curricular standards, the criteria used in Stage 2 to evaluate performance tasks inherently must measure whether those specific standards and goals have been met. Setting clear evaluative criteria ensures that assessments require students to actually demonstrate their understanding of the targeted knowledge and skills. Failing to align these criteria with the targeted goals and standards compromises the validity and coherence of the unit design.`
          }] 
        }
      };

      if (expectJson) {
        payload.generationConfig = { responseMimeType: "application/json" };
      }

      const proxyUrl = `https://gemini-proxy.jon-thomas.workers.dev`;
      
      try {
        const response = await fetch(proxyUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (!response.ok) {
          const errData = await response.text();
          throw new Error(`Proxy Error: ${errData || 'HTTP ' + response.status}`);
        }
        
        const data = await response.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text || "No content generated.";
      } catch (error) {
        throw error;
      }
    };

    // --- Utility Functions ---
    const parseLLMResponse = (text) => {
       try {
          const cleaned = text.replace(/```json/g, '').replace(/```/g, '').trim();
          const parsed = JSON.parse(cleaned);

          const normalize = (obj) => {
             if (obj === null || obj === undefined) return '';
             if (typeof obj === 'string') return obj;
             if (Array.isArray(obj)) return obj.map(item => normalize(item)).join('\n');
             if (typeof obj === 'object') {
                 return Object.entries(obj).map(([k, v]) => `${k}: ${normalize(v)}`).join('\n');
             }
             return String(obj);
          };

          if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
              if ('scenario' in parsed) parsed.scenario = normalize(parsed.scenario);
              if ('elements' in parsed) parsed.elements = normalize(parsed.elements);
              if ('udl' in parsed) parsed.udl = normalize(parsed.udl);
              
              if ('evaluativeCriteria' in parsed) {
                  if (Array.isArray(parsed.evaluativeCriteria)) {
                      parsed.evaluativeCriteria.forEach(c => {
                          if ('criterion' in c) c.criterion = normalize(c.criterion);
                          if ('kusps' in c) c.kusps = normalize(c.kusps);
                          if ('descriptor' in c) c.descriptor = normalize(c.descriptor);
                          if ('teacherNotes' in c) c.teacherNotes = normalize(c.teacherNotes);
                      });
                  } else {
                      parsed.evaluativeCriteria = normalize(parsed.evaluativeCriteria);
                  }
              }
              
              // New keys for Transfer Goals
              if ('alignmentCheck' in parsed) parsed.alignmentCheck = normalize(parsed.alignmentCheck);
              if ('goals' in parsed && Array.isArray(parsed.goals)) {
                  parsed.goals.forEach(g => {
                      if ('goal' in g) g.goal = normalize(g.goal);
                      if ('rationale' in g) g.rationale = normalize(g.rationale);
                  });
              }
          }

          if (Array.isArray(parsed)) {
             parsed.forEach(item => {
                 if ('title' in item) item.title = normalize(item.title);
                 if ('description' in item) item.description = normalize(item.description);
                 if ('udl' in item) item.udl = normalize(item.udl);
                 if ('kusps' in item) item.kusps = normalize(item.kusps);
                 if ('competencies' in item) item.competencies = normalize(item.competencies);
                 if ('successCriteria' in item) item.successCriteria = normalize(item.successCriteria);
                 
                 // Keys for Other Evidence & Self Assessment
                 if ('evaluativeCriteria' in item) item.evaluativeCriteria = normalize(item.evaluativeCriteria);
                 if ('evidence' in item) item.evidence = normalize(item.evidence);
                 if ('method' in item) item.method = normalize(item.method);
                 if ('assessmentType' in item) item.assessmentType = normalize(item.assessmentType);
                 if ('category' in item) item.category = normalize(item.category);
             });
          }

          return parsed;
       } catch (e) {
          throw new Error("Failed to parse the AI response format. Please try generating again.");
       }
    };

    function parseCSV(text) {
      const result = [];
      let cur = '';
      let inQuotes = false;
      let row = [];
      
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        if (char === '"' && text[i+1] === '"') {
          cur += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          row.push(cur);
          cur = '';
        } else if (char === '\n' && !inQuotes) {
          if (cur.endsWith('\r')) cur = cur.slice(0, -1);
          row.push(cur);
          result.push(row);
          row = [];
          cur = '';
        } else {
          cur += char;
        }
      }
      
      if (cur || row.length) {
        if (cur.endsWith('\r')) cur = cur.slice(0, -1);
        row.push(cur);
        result.push(row);
      }
      
      return result;
    }

    const getCategory = (code) => {
      if (!code) return 'other';
      const parts = code.toUpperCase().split('.');
      const hasU = parts.some(p => p === 'U' || /^U\d+/.test(p));
      const hasK = parts.some(p => p === 'K' || /^K\d+/.test(p));
      const hasSP = parts.some(p => p === 'SP' || /^SP\d+/.test(p));
      const hasLO = parts.some(p => p === 'LO' || /^LO\d+/.test(p));
      const hasGQ = parts.some(p => p === 'GQ' || /^GQ\d+/.test(p));

      if (hasK) return 'knows';
      if (hasSP) return 'skills';
      if (hasU) return 'understandings';
      if (hasLO) return 'goals';
      if (hasGQ) return 'questions';
      return 'other'; 
    };

    const getRequiredParents = (code) => {
      const parents = [];
      if (!code) return parents;
      const cat = getCategory(code);
      const isChild = cat === 'understandings' || cat === 'knows' || cat === 'skills';
      
      if (isChild) {
         const oiMatch = code.match(/(.*?OI\.\d+)/);
         if (oiMatch) parents.push(oiMatch[1]);
         
         const gqMatch = code.match(/(.*?GQ\.\d+)/);
         if (gqMatch) parents.push(gqMatch[1]);
         
         const loMatch = code.match(/(.*?LO\.\d+)/);
         if (loMatch) parents.push(loMatch[1]);
         
         if (cat === 'knows' || cat === 'skills') {
            const uMatch = code.match(/(.*?U\.\d+)/);
            if (uMatch) parents.push(uMatch[1]);
         }
      }
      return parents;
    };

    const colorPalette = [
      { light: 'bg-blue-100', hover: 'hover:bg-blue-200', border: 'border-blue-300' },
      { light: 'bg-orange-100', hover: 'hover:bg-orange-200', border: 'border-orange-300' },
      { light: 'bg-red-100', hover: 'hover:bg-red-200', border: 'border-red-300' },
      { light: 'bg-purple-100', hover: 'hover:bg-purple-200', border: 'border-purple-300' },
      { light: 'bg-yellow-100', hover: 'hover:bg-yellow-200', border: 'border-yellow-300' },
      { light: 'bg-teal-100', hover: 'hover:bg-teal-200', border: 'border-teal-300' },
      { light: 'bg-pink-100', hover: 'hover:bg-pink-200', border: 'border-pink-300' },
      { light: 'bg-indigo-100', hover: 'hover:bg-indigo-200', border: 'border-indigo-300' },
      { light: 'bg-cyan-100', hover: 'hover:bg-cyan-200', border: 'border-cyan-300' },
      { light: 'bg-lime-100', hover: 'hover:bg-lime-200', border: 'border-lime-300' },
      { light: 'bg-rose-100', hover: 'hover:bg-rose-200', border: 'border-rose-300' },
      { light: 'bg-emerald-100', hover: 'hover:bg-emerald-200', border: 'border-emerald-300' }
    ];

    const getCodeBgColor = (code, isHoverable = false) => {
      const upperCode = code.toUpperCase();
      const match = upperCode.match(/(?:LO|GQ)\.(\d+)/);
      if (match) {
         const num = parseInt(match[1], 10);
         const colorObj = colorPalette[(num - 1) % colorPalette.length];
         return isHoverable ? `${colorObj.light} ${colorObj.hover}` : colorObj.light;
      }
      if (!upperCode.includes('LO') && !upperCode.includes('GQ')) {
         return isHoverable ? 'bg-green-100 hover:bg-green-200' : 'bg-green-100';
      }
      return isHoverable ? 'bg-white hover:brightness-95' : 'bg-gray-50';
    };

    const getHierarchyBadgeColor = (prefix) => {
      switch(prefix) {
        case 'OI': return 'bg-green-100 text-green-800 border-green-300';
        case 'GQ': return 'bg-blue-100 text-blue-800 border-blue-300';
        case 'LO': return 'bg-gray-200 text-gray-800 border-gray-300';
        case 'U': return 'bg-purple-100 text-purple-800 border-purple-300';
        case 'K': return 'bg-yellow-100 text-yellow-800 border-yellow-300';
        case 'SP': return 'bg-orange-100 text-orange-800 border-orange-300';
        default: return 'bg-gray-100 text-gray-800 border-gray-300';
      }
    };

    const FormattedDescription = ({ text, className }) => {
      if (!text) return null;
      
      const renderFormattedText = (str) => {
         if (!str) return str;
         str = str.replace(/UDL Integration/gi, 'UDL Considerations').replace(/UDL Alignment Breakdown/gi, 'UDL Considerations');
         const parts = str.split(/(\*\*.*?\*\*|\*(?!\s).*?(?<!\s)\*|\^.*?\^|_.*?_)/g);
         return parts.map((part, idx) => {
            if (part.startsWith('**') && part.endsWith('**')) {
               return <strong key={idx}>{part.slice(2, -2)}</strong>;
            }
            if (part.startsWith('*') && part.endsWith('*') && part.length > 1) {
               return <strong key={idx}>{part.slice(1, -1)}</strong>;
            }
            if (part.startsWith('^') && part.endsWith('^')) {
               return <sup key={idx}>{part.slice(1, -1)}</sup>;
            }
            if (part.startsWith('_') && part.endsWith('_')) {
               return <sub key={idx}>{part.slice(1, -1)}</sub>;
            }
            return part;
         });
      };

      const parts = text.split(/(?=(?:^|\s)- )/g);
      if (parts.length === 1) return <span className={className}>{renderFormattedText(text)}</span>;
      return (
        <div className={className}>
          {parts.map((part, index) => {
            const trimmed = part.trimStart();
            if (trimmed.startsWith('- ')) {
              return (
                <div key={index} className="flex items-start mt-1 ml-5">
                  <span className="mr-2 text-eips-green font-bold">&bull;</span>
                  <span>{renderFormattedText(trimmed.substring(2))}</span>
                </div>
              );
            }
            return <span key={index}>{renderFormattedText(part)}</span>;
          })}
        </div>
      );
    };

    // NEW: Smart formatter for AI-generated text in the UI
    const FormattedAIText = ({ text, className }) => {
      if (!text) return null;
      const lines = text.split('\n');
      const elements = [];
      let currentList = [];
      let listType = null;

      const renderFormattedText = (str) => {
         if (!str) return str;
         str = str.replace(/UDL Integration/gi, 'UDL Considerations').replace(/UDL Alignment Breakdown/gi, 'UDL Considerations');
         const parts = str.split(/(\*\*.*?\*\*|\*(?!\s).*?(?<!\s)\*|\^.*?\^|_.*?_)/g);
         return parts.map((part, idx) => {
            if (part.startsWith('**') && part.endsWith('**')) {
               return <strong key={idx}>{part.slice(2, -2)}</strong>;
            }
            if (part.startsWith('*') && part.endsWith('*') && part.length > 1) {
               return <strong key={idx}>{part.slice(1, -1)}</strong>;
            }
            if (part.startsWith('^') && part.endsWith('^')) {
               return <sup key={idx}>{part.slice(1, -1)}</sup>;
            }
            if (part.startsWith('_') && part.endsWith('_')) {
               return <sub key={idx}>{part.slice(1, -1)}</sub>;
            }
            return part;
         });
      };

      const pushList = (key) => {
        if (currentList.length > 0) {
          if (listType === 'ul') elements.push(<ul key={key} className="list-disc pl-5 my-2 space-y-1">{currentList}</ul>);
          if (listType === 'ol') elements.push(<ol key={key} className="list-decimal pl-5 my-2 space-y-1">{currentList}</ol>);
          currentList = [];
        }
      };

      lines.forEach((line, i) => {
        const indentMatch = line.match(/^(\s*)/);
        const indentLevel = indentMatch ? Math.floor(indentMatch[1].length / 2) : 0;
        const trimmed = line.trim();
        const isBullet = trimmed.match(/^[-*]\s+(.*)/);
        const isNumber = trimmed.match(/^(\d+)\.\s+(.*)/);
        const isHeading = trimmed.match(/^(#{1,6})\s+(.*)/);

        if (isHeading) {
          pushList(`list-${i}`);
          const level = isHeading[1].length;
          const content = renderFormattedText(isHeading[2]);
          if (level <= 2) {
             elements.push(<h3 key={`h-${i}`} className="text-lg font-bold text-indigo-900 mt-4 mb-2">{content}</h3>);
          } else {
             elements.push(<h4 key={`h-${i}`} className="text-base font-bold text-gray-800 mt-3 mb-1">{content}</h4>);
          }
        } else if (isBullet) {
          if (listType === 'ol') pushList(`list-${i}`);
          listType = 'ul';
          currentList.push(<li key={i} className="pl-1 mb-1" style={{ marginLeft: `${indentLevel * 1}rem`, listStyleType: indentLevel > 0 ? 'circle' : 'disc' }}>{renderFormattedText(isBullet[1])}</li>);
        } else if (isNumber) {
          if (listType === 'ul') pushList(`list-${i}`);
          listType = 'ol';
          currentList.push(<li key={i} className="pl-1 mb-1" style={{ marginLeft: `${indentLevel * 1}rem` }}>{renderFormattedText(isNumber[2])}</li>);
        } else {
          pushList(`list-${i}`);
          if (trimmed !== '') {
            elements.push(<p key={`p-${i}`} className="mb-3 leading-relaxed">{renderFormattedText(trimmed)}</p>);
          }
        }
      });
      pushList('list-end');

      return <div className={`text-sm text-gray-800 ${className || ''}`}>{elements}</div>;
    };

    // NEW: Extracts UDL string into 3 separate parts for distinct column rendering
    const getUdlParts = (udlString) => {
        if (!udlString) return { eng: '', rep: '', act: '' };
        const parts = { eng: '', rep: '', act: '' };
        
        const engRegex = /###\s*(?:\*\*)?Multiple Means of Engagement(?:\*\*)?\s*([\s\S]*?)(?=###|$)/i;
        const repRegex = /###\s*(?:\*\*)?Multiple Means of Representation(?:\*\*)?\s*([\s\S]*?)(?=###|$)/i;
        const actRegex = /###\s*(?:\*\*)?Multiple Means of Action (?:and|&)\s*Expression(?:\*\*)?\s*([\s\S]*?)(?=###|$)/i;

        const eMatch = udlString.match(engRegex);
        const rMatch = udlString.match(repRegex);
        const aMatch = udlString.match(actRegex);

        if (eMatch) parts.eng = eMatch[1].trim();
        if (rMatch) parts.rep = rMatch[1].trim();
        if (aMatch) parts.act = aMatch[1].trim();

        if (!parts.eng && !parts.rep && !parts.act) return { eng: udlString, rep: '', act: '' };
        return parts;
    };

    const UdlGrid = ({ udl }) => {
        if (!udl) return null;
        const parts = getUdlParts(udl);
        return (
            <div className="mt-3 border border-indigo-100 rounded-md overflow-hidden bg-white shadow-sm mb-3">
                <div className="bg-indigo-50 px-3 py-2 border-b border-indigo-100 font-bold text-xs text-indigo-900 uppercase tracking-wider flex items-center"><SparkleIcon /> UDL Considerations</div>
                <div className="grid grid-cols-1 md:grid-cols-3 divide-y md:divide-y-0 md:divide-x divide-indigo-100">
                    <div className="p-3 bg-white">
                        <strong className="block text-xs text-indigo-800 mb-1 border-b border-indigo-50 pb-1">Engagement</strong>
                        <FormattedAIText text={parts.eng} className="text-xs" />
                    </div>
                    <div className="p-3 bg-white">
                        <strong className="block text-xs text-indigo-800 mb-1 border-b border-indigo-50 pb-1">Representation</strong>
                        <FormattedAIText text={parts.rep} className="text-xs" />
                    </div>
                    <div className="p-3 bg-white">
                        <strong className="block text-xs text-indigo-800 mb-1 border-b border-indigo-50 pb-1">Action & Expression</strong>
                        <FormattedAIText text={parts.act} className="text-xs" />
                    </div>
                </div>
            </div>
        );
    };

    const exportToWord = (unitName, items, config, unitDataForExport) => {
      const categories = {
        understandings: items.filter(i => getCategory(i.code) === 'understandings'),
        knows: items.filter(i => getCategory(i.code) === 'knows'),
        skills: items.filter(i => getCategory(i.code) === 'skills'),
        goals: items.filter(i => getCategory(i.code) === 'goals'),
        other: items.filter(i => getCategory(i.code) === 'other'),
        questions: items.filter(i => getCategory(i.code) === 'questions'),
      };

      const tgList = unitDataForExport?.transferGoals || [];
      const pt = unitDataForExport?.performanceTask;
      const evList = unitDataForExport?.otherEvidence || [];
      const saList = unitDataForExport?.selfAssessments || [];
      const lessons = unitDataForExport?.lessons || [];

      const applyInline = (str) => {
         if (!str) return '';
         return str
            .replace(/UDL Integration/gi, 'UDL Considerations')
            .replace(/UDL Alignment Breakdown/gi, 'UDL Considerations')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(?!\s)(.*?)(?<!\s)\*/g, '<strong>$1</strong>')
            .replace(/\^(.*?)\^/g, '<sup>$1</sup>')
            .replace(/_(.*?)_/g, '<sub>$1</sub>');
      };

      const renderList = (list) => {
        if (!list || list.length === 0) return '<p><i>None selected</i></p>';
        return `<ul>${list.map(i => {
          let descHtml = applyInline(i.desc);
          const parts = descHtml.split(/(?=(?:^|\s)- )/g);
          if (parts.length > 1) {
            descHtml = parts.map(p => {
              const trimmed = p.trimStart();
              if (trimmed.startsWith('- ')) {
                return `<br>&nbsp;&nbsp;&nbsp;&nbsp;&#8226; ${trimmed.substring(2)}`;
              }
              return p;
            }).join('');
          }
          return `<li style="margin-bottom: 6px;"><strong>${i.code}</strong>: ${descHtml}</li>`;
        }).join('')}</ul>`;
      };

      // Robust text formatter for Word Document (handles line breaks and bullet points)
      const formatTextForWord = (text) => {
        if (!text) return '';
        const lines = text.split('\n');
        let html = '';
        let inList = false;
        let listType = '';

        const closeList = () => {
          if (inList) {
            html += listType === 'ul' ? '</ul>' : '</ol>';
            inList = false;
          }
        };

        lines.forEach(line => {
          const indentMatch = line.match(/^(\s*)/);
          const indentLevel = indentMatch ? Math.floor(indentMatch[1].length / 2) : 0;
          const marginPx = indentLevel * 20;
          const trimmed = line.trim();
          if (!trimmed) {
             closeList();
             // Prevent double spaces by NOT appending <br> when there's an empty line, 
             // since <p> and <ul> already have their own bottom margins.
             return;
          }
          
          const isBullet = trimmed.match(/^[-*]\s+(.*)/);
          const isNumber = trimmed.match(/^(\d+)\.\s+(.*)/);
          const isHeading = trimmed.match(/^(#{1,6})\s+(.*)/);

          if (isHeading) {
            closeList();

        });
        closeList();

    // --- Main Application Component ---
    function App() {
      const [items, setItems] = useState([]);
      const [unitData, setUnitData] = useState({});
      const [activeTab, setActiveTab] = useState('course');
      const [searchTerm, setSearchTerm] = useState('');
      const [hierarchyFilter, setHierarchyFilter] = useState('');
      const [saveStatus, setSaveStatus] = useState('');
      const [showInstructions, setShowInstructions] = useState(false);

      // AI Tool Intermediate State
      const [activeAiTool, setActiveAiTool] = useState(null);
      const [customInstruction, setCustomInstruction] = useState('');

      // Custom Scrollbar References
      const tableRef = useRef(null);
      const scrollRef = useRef(null);

      // Course Selection Config (Starts empty to show instructions)
      const [appConfig, setAppConfig] = useState({ grade: '', subject: '', numUnits: '' });
      const [loadedConfig, setLoadedConfig] = useState(null);
      const [loadingData, setLoadingData] = useState(false);
      const [loadError, setLoadError] = useState('');
      
      // Modals State
      const [showResetConfirm, setShowResetConfirm] = useState(false);
      const [showSavePrompt, setShowSavePrompt] = useState(false);
      const [showCourseConfirm, setShowCourseConfirm] = useState(false);
      const [pendingTab, setPendingTab] = useState(null);
      
      // LLM Modal State
      const [llmModal, setLlmModal] = useState({ isOpen: false, type: '', unitNum: null, selectedIndices: [], title: '', content: null, isLoading: false, error: '' });

      const subjectIconMap = {
        'Social Studies': 'sss.svg',
        'Physical Education and Wellness': 'pde.svg',
        'Math': 'mat.svg',
        'Career Education and Financial Literacy': 'cefl.svg'
      };

      useEffect(() => {
        const savedData = localStorage.getItem('curriculumPlannerData');
        if (savedData) {
          try {
            const parsed = JSON.parse(savedData);
            if (parsed.items && parsed.loadedConfig) {
              setItems(parsed.items);
              setLoadedConfig(parsed.loadedConfig);
              setAppConfig(parsed.loadedConfig);
              if (parsed.unitData) setUnitData(parsed.unitData);
              setActiveTab('checklist');
            } else if (Array.isArray(parsed)) {
              localStorage.removeItem('curriculumPlannerData');
            }
          } catch (e) {
            console.error("Error loading saved data", e);
          }
        }
      }, []);

      const handleSaveProgress = () => {
        localStorage.setItem('curriculumPlannerData', JSON.stringify({ items, loadedConfig, unitData }));
        setSaveStatus('Saved!');
        setTimeout(() => setSaveStatus(''), 2000); 
      };

      const handleReset = () => {
        setItems([]);
        setLoadedConfig(null);
        setAppConfig({ grade: '', subject: '', numUnits: '' });
        setUnitData({}); 
        setHierarchyFilter('');
        setActiveTab('course');
        localStorage.removeItem('curriculumPlannerData');
        setShowResetConfirm(false);
      };

      const executeLoadCourse = async () => {
        setShowCourseConfirm(false);
        setLoadingData(true);
        setLoadError('');
        setHierarchyFilter('');
        
        const subjectMap = {
          'Math': 'math',
          'Social Studies': 'social-studies',
          'Physical Education and Wellness': 'pew',
          'Career Education and Financial Literacy': 'cefl'
        };
        
        const fileName = `${appConfig.grade}_${subjectMap[appConfig.subject]}.csv`;
        
        try {
          const res = await fetch(fileName);
          if (!res.ok) throw new Error(`Could not find file: ${fileName}. Please ensure it is saved in the same directory as this index file.`);
          const text = await res.text();
          const parsed = parseCSV(text);
          
          let lastUReplacement = 'U.1';

          const data = parsed.slice(1)
            .filter(r => r.length > 1 && r[0])
            .map((r, index) => {
              let code = r[0].trim();
              const upperCode = code.toUpperCase();
              
              const isLO = /(?:^|\.)LO\.\d+(?:$|\.)/.test(upperCode) && !/(?:^|\.)U\.\d+/.test(upperCode) && !/(?:^|\.)K\.\d+/.test(upperCode) && !/(?:^|\.)SP\.\d+/.test(upperCode);
              const isU = /(?:^|\.)U\.\d+(?:$|\.)/.test(upperCode);
              const isK = /(?:^|\.)K\.\d+(?:$|\.)/.test(upperCode);
              const isSP = /(?:^|\.)SP\.\d+(?:$|\.)/.test(upperCode);

              if (isLO) lastUReplacement = 'U.1'; 
              if (isU) {
                const uMatch = upperCode.match(/U\.\d+/);
                if (uMatch) lastUReplacement = uMatch[0];
              }

              if ((isK || isSP) && !/(?:^|\.)U\.\d+/.test(upperCode)) {
                code = code.replace(/(K\.\d+|SP\.\d+)/i, `${lastUReplacement}.$1`);
              }

              const item = {
                id: index,
                code: code,
                desc: r[1] ? r[1].replace(/\n/g, ' ') : ''
              };
              for(let i = 1; i <= appConfig.numUnits; i++) {
                item[`u${i}`] = false;
              }
              return item;
            });
            
          setItems(data);
          setLoadedConfig(appConfig);
          setUnitData({}); // Clear out old unit data when a new course is loaded
          setActiveTab('checklist');
        } catch(err) {
          setLoadError(err.message);
        } finally {
          setLoadingData(false);
        }
      };

      const handleLoadClick = () => {
        if (items.length > 0) setShowCourseConfirm(true);
        else executeLoadCourse();
      };

      const handleManualUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setShowCourseConfirm(false);
        setLoadingData(true);
        setLoadError('');
        setHierarchyFilter('');

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const text = evt.target.result;
            const parsed = parseCSV(text);
            
            let lastUReplacement = 'U.1';

            const data = parsed.slice(1)
              .filter(r => r.length > 1 && r[0])
              .map((r, index) => {
                let code = r[0].trim();
                const upperCode = code.toUpperCase();
                
                const isLO = /(?:^|\.)LO\.\d+(?:$|\.)/.test(upperCode) && !/(?:^|\.)U\.\d+/.test(upperCode) && !/(?:^|\.)K\.\d+/.test(upperCode) && !/(?:^|\.)SP\.\d+/.test(upperCode);
                const isU = /(?:^|\.)U\.\d+(?:$|\.)/.test(upperCode);
                const isK = /(?:^|\.)K\.\d+(?:$|\.)/.test(upperCode);
                const isSP = /(?:^|\.)SP\.\d+(?:$|\.)/.test(upperCode);

                if (isLO) lastUReplacement = 'U.1'; 
                if (isU) {
                  const uMatch = upperCode.match(/U\.\d+/);
                  if (uMatch) lastUReplacement = uMatch[0];
                }

                if ((isK || isSP) && !/(?:^|\.)U\.\d+/.test(upperCode)) {
                  code = code.replace(/(K\.\d+|SP\.\d+)/i, `${lastUReplacement}.$1`);
                }

                const item = {
                id: index,
                code: code,
                desc: r[1] ? r[1].replace(/\n/g, ' ') : ''
              };
              for(let i = 1; i <= appConfig.numUnits; i++) {
                item[`u${i}`] = false;
              }
              return item;
            });
              
            setItems(data);
            setLoadedConfig(appConfig);
            setUnitData({}); // Clear out old unit data on manual override
            setActiveTab('checklist');
          } catch (err) {
            setLoadError('Error parsing manual file: ' + err.message);
          } finally {
            setLoadingData(false);
          }
        };
        reader.onerror = () => {
          setLoadError('Failed to read file.');
          setLoadingData(false);
        };
        reader.readAsText(file);
        e.target.value = null;
      };

      const handleTableScroll = (e) => {
        if (scrollRef.current && scrollRef.current.scrollLeft !== e.target.scrollLeft) {
          scrollRef.current.scrollLeft = e.target.scrollLeft;
        }
      };

      const handleFakeScroll = (e) => {
        if (tableRef.current && tableRef.current.scrollLeft !== e.target.scrollLeft) {
          tableRef.current.scrollLeft = e.target.scrollLeft;
        }
      };

      const toggleUnit = (id, unitField) => {
        const toggledItem = items.find(i => i.id === id);
        if (!toggledItem) return;

        const newState = !toggledItem[unitField];
        const code = toggledItem.code;
        const cat = getCategory(code);
        
        let partnerMatchFn = null;
        let parentMatchFns = [];
        
        const numMatch = code.match(/(?:LO|GQ)\.(\d+)/);
        if (numMatch && (cat === 'goals' || cat === 'questions')) {
           const num = numMatch[1];
           if (cat === 'goals') {
              const regex = new RegExp(`(?:^|\\.)GQ\\.${num}(?:$|\\.)`);
              partnerMatchFn = (i) => getCategory(i.code) === 'questions' && regex.test(i.code);
           } else {
              const regex = new RegExp(`(?:^|\\.)LO\\.${num}(?:$|\\.)`);
              partnerMatchFn = (i) => getCategory(i.code) === 'goals' && regex.test(i.code);
           }
        }

        const isChild = cat === 'understandings' || cat === 'knows' || cat === 'skills';
        if (newState === true && isChild) {
           const oiMatch = code.match(/(.*?OI\.\d+)/);
           if (oiMatch) parentMatchFns.push((i) => i.code === oiMatch[1]);
           const gqMatch = code.match(/(.*?GQ\.\d+)/);
           if (gqMatch) parentMatchFns.push((i) => i.code === gqMatch[1]);
           const loMatch = code.match(/(.*?LO\.\d+)/);
           if (loMatch) parentMatchFns.push((i) => i.code === loMatch[1]);
           const uMatch = code.match(/(.*?U\.\d+)/);
           if (uMatch && (cat === 'knows' || cat === 'skills')) {
              parentMatchFns.push((i) => i.code === uMatch[1]);
           }
        }

        setItems(prevItems => prevItems.map(item => {
          let updatedItem = { ...item };
          let changed = false;

          if (item.id === id) {
            updatedItem[unitField] = newState;
            changed = true;
          } else if (partnerMatchFn && partnerMatchFn(item)) {
            updatedItem[unitField] = newState;
            changed = true;
          }
          
          if (newState === true && parentMatchFns.some(fn => fn(item))) {
            updatedItem[unitField] = true;
            changed = true;
          }

          return changed ? updatedItem : item;
        }));
      };

      const scrollToGroup = (groupNum) => {
        setSearchTerm(''); 
        setHierarchyFilter('');
        const executeScroll = () => {
           const match = items.find(i => {
              if (groupNum === 'OI') return !i.code.includes('LO') && !i.code.includes('GQ');
              return i.code.includes(`LO.${groupNum}`) || i.code.includes(`GQ.${groupNum}`);
           });
           if (match) {
              const el = document.getElementById(`row-${match.id}`);
              if (el) {
                 el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                 const originalBg = el.style.backgroundColor;
                 el.style.transition = 'background-color 0.5s';
                 el.style.backgroundColor = '#fef08a'; 
                 setTimeout(() => { el.style.backgroundColor = originalBg; }, 1500);
              }
           }
        };
        if (activeTab !== 'checklist') {
           setActiveTab('checklist');
           setTimeout(executeScroll, 150); 
        } else {
           setTimeout(executeScroll, 50); 
        }
      };

      const scrollToItem = (targetFullCode) => {
        setSearchTerm(''); 
        const executeScroll = () => {
           const match = items.find(i => i.code === targetFullCode);
           if (match) {
              const el = document.getElementById(`row-${match.id}`);
              if (el) {
                 el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                 const originalBg = el.style.backgroundColor;
                 el.style.transition = 'background-color 0.5s';
                 el.style.backgroundColor = '#fef08a'; 
                 setTimeout(() => { el.style.backgroundColor = originalBg; }, 1500);
              }
           }
        };
        if (activeTab !== 'checklist') {
           setActiveTab('checklist');
           setTimeout(executeScroll, 150); 
        } else {
           setTimeout(executeScroll, 50); 
        }
      };

      const handleTabClick = (tab) => {
        if (activeTab === 'checklist' && tab !== 'checklist') {
          const savedData = localStorage.getItem('curriculumPlannerData');
          const currentData = JSON.stringify({ items, loadedConfig, unitData });
          if (items.length > 0 && savedData !== currentData) {
            setPendingTab(tab);
            setShowSavePrompt(true);
            return;
          }
        }
        setActiveTab(tab);
        setActiveAiTool(null);
        setCustomInstruction('');
      };

      const buildPromptContext = (unitItems) => {
        let contextText = `I am planning a Unit for Grade ${loadedConfig.grade} ${loadedConfig.subject}.\n\n`;
        contextText += `Here are the specific curriculum outcomes I have selected for this unit:\n`;
        unitItems.forEach(item => {
           const cat = getCategory(item.code);
           if (cat === 'goals' || cat === 'understandings' || cat === 'knows' || cat === 'skills') {
              contextText += `- [${item.code}] ${item.desc}\n`;
           }
        });
        return contextText;
      };

      // AI GENERATION HANDLERS
      
      const handleGenerateTransferGoals = async (unitItems, unitNum) => {
        setActiveAiTool(null);
        setLlmModal({ isOpen: true, type: 'transfer', unitNum, selectedIndices: [], title: 'Brainstorming Transfer Goals...', content: null, isLoading: true, error: '' });
        
        const context = buildPromptContext(unitItems);
        let prompt = `${context}\n\nYou are an expert Curriculum Designer specializing in Grant Wiggins and Jay McTighe's Understanding by Design (UbD) framework. Your task is to analyze the provided list of curricular outcomes or standards and generate a selection of high-quality Transfer Goals.\n\nContext: What is a Transfer Goal?\nIn the UbD framework, a transfer goal defines the long-term aim of a curriculum. It specifies what students should be able to independently do with their acquired knowledge and skills in new, novel, and real-world situations long after specific instruction has ended.\n\nRules for Generating Transfer Goals:\n1. Format: Every transfer goal MUST begin with the exact phrase: "Students will be able to independently use their learning to..."\n2. Autonomy: The goal must focus on independent application, without teacher prompting or scaffolding.\n3. Real-World Application: The goal must apply to messy, complex, real-world situations outside the classroom, not just academic tests or isolated school tasks.\n4. Novelty: The goal must require students to adapt and apply their learning to new situations they haven't explicitly encountered in the lessons.\n5. Synthesis: Do not simply rewrite the individual curricular outcomes. Synthesize the provided outcomes into broader, overarching purposes.\n6. Quantity: Provide exactly 3 distinct transfer goal options for the teacher to choose from.`;
        
        if (customInstruction.trim()) prompt += `\n\nADDITIONAL INSTRUCTIONS FROM TEACHER:\n${customInstruction.trim()}`;
        
        prompt += `\n\nYou MUST return ONLY a valid JSON object with exactly two keys:\n- "alignmentCheck": A brief, 2-3 sentence string summarizing the core concepts you identified from the provided outcomes that informed these transfer goals.\n- "goals": An array of exactly 3 objects. Each object must have exactly these string keys:\n  - "goal": The transfer goal string (starting with "Students will be able to independently use their learning to...").\n  - "rationale": A 1-2 sentence string explaining how this goal synthesizes the provided outcomes and applies to the real world.`;

        try {
          const response = await generateGeminiContent(prompt, true);
          const parsedData = parseLLMResponse(response);
          setLlmModal(prev => ({ ...prev, title: 'Transfer Goal Ideas', content: parsedData, isLoading: false }));
        } catch (err) {
          setLlmModal(prev => ({ ...prev, title: 'Generation Failed', error: err.message, isLoading: false }));
        }
      };

      const handleGeneratePerformanceTask = async (unitItems, unitNum) => {
        setActiveAiTool(null);
        setLlmModal({ isOpen: true, type: 'pt', unitNum, selectedIndices: [], title: 'Drafting Performance Task...', content: null, isLoading: true, error: '' });
        
        const context = buildPromptContext(unitItems);
        let prompt = `${context}\n\nPlease design exactly 1 authentic 'Performance Task' for this unit that assesses the selected items. Use the GRASPS model (Goal, Role, Audience, Situation, Product, Standards). Keep it engaging, realistic, and directly aligned with the provided curriculum.`;
        if (customInstruction.trim()) prompt += `\n\nADDITIONAL INSTRUCTIONS FROM TEACHER:\n${customInstruction.trim()}`;
        prompt += `\n\nYou MUST return ONLY a valid JSON object with exactly four keys:\n1. "scenario": A string describing the learning activity in story form.\n2. "elements": A string describing the specific elements of the task students must complete. You MUST explicitly list and define each of the GRASPS components. CRITICAL: Use proper Markdown formatting with nested bullet points (e.g., using hyphens - and indented spaces) to ensure clear hierarchies, particularly under 'Product' and 'Standards'.\n3. "udl": A string containing the UDL Considerations. CRITICAL: You MUST use EXACTLY this format:\n### **Multiple Means of Engagement**\n- [bullet point]\n- [bullet point]\n\n### **Multiple Means of Representation**\n- [bullet point]\n- [bullet point]\n\n### **Multiple Means of Action and Expression**\n- [bullet point]\n- [bullet point]\n(Do NOT output wordy paragraphs, only these bold headings and bullets).\n4. "evaluativeCriteria": An ARRAY of objects representing a rubric. Each object must have exactly these string keys:\n   - "criterion": The short name or title of the specific evaluative criterion.\n   - "kusps": The specific Knowledge, Understandings, Skills & Procedures (KUSPs) being addressed.\n   - "descriptor": A detailed description of what successful demonstration of this criterion looks like.\n   - "teacherNotes": Notes for the teacher explaining exactly how this criterion relates to and measures the selected Learning Outcome(s) (LO).`;

        try {
          const response = await generateGeminiContent(prompt, true);
          const parsedData = parseLLMResponse(response);
          setLlmModal(prev => ({ ...prev, title: 'Performance Task Draft', content: parsedData, isLoading: false }));
        } catch (err) {
          setLlmModal(prev => ({ ...prev, title: 'Generation Failed', error: err.message, isLoading: false }));
        }
      };

      const handleGenerateOtherEvidence = async (unitItems, unitNum) => {
        setActiveAiTool(null);
        setLlmModal({ isOpen: true, type: 'evidence', unitNum, selectedIndices: [], title: 'Brainstorming Ongoing Assessments...', content: null, isLoading: true, error: '' });
        
        const context = buildPromptContext(unitItems);

          const useCount = Array.from({length: unitCount}, (_, i) => item[`u${i+1}`]).filter(Boolean).length;
          const useCountColor = useCount === 0 ? 'text-red-600' : 'text-green-600';

          const badges = [];

          for (let i = 0; i < parts.length; i += 2) {
            let badgeText = parts[i];
            if (parts[i+1]) badgeText += `.${parts[i+1]}`;

            badges.push({ fullText: badgeText, prefix: parts[i], fullCode: currentCodePath });

          let rowClasses = `flex items-stretch transition-colors w-max min-w-full ${isFirst ? 'rounded-t-lg ' : ''}${isLast ? 'rounded-b-lg ' : ''}`;

            textClasses += "font-bold text-gray-900 ";
          } else { 
            const cat = getCategory(item.code);
            if (cat === 'understandings') {
               rowClasses += "border-b border-black/5 hover:brightness-95 ";
               textClasses += "font-semibold text-gray-800 ";
            } else {
               rowClasses += "border-b border-gray-100 hover:bg-gray-50 last:border-b-0 ";

                </div>
              </div>
              <div className="flex bg-gray-50 border-t border-gray-200 shrink-0 relative z-50">
                 <div className="w-[520px] shrink-0 border-l border-transparent border-r-2 border-gray-300 bg-gray-100"></div>

                    <div style={{ width: `${100 + (unitCount * 80)}px`, height: '1px' }}></div>
                 </div>
              </div>
            </div>
          </div>

        const unitItems = items.filter(item => item[unitField]);
        const currentUnitData = unitData[unitNum] || {};

          evidence: "Through what other evidence will students demonstrate achievement of the desired results? Effective assessment relies on triangulation—gathering a balanced selection of observations, conversations, and student products. Using this diverse mix of formative and summative assessments throughout the unit ensures a holistic and accurate picture of student learning.",
          selfAssessment: "Student self-assessment involves learners demonstrating metacognitive awareness of their own understanding, mental habits, and limitations. By evaluating their own progress against specified criteria, students actively reflect on their work to identify how they can improve rather than relying solely on teacher feedback."
        };

        const removeIndividualItem = (category, indexToRemove) => {
          setUnitData(prev => {
            const upd = { ...prev };
            if (upd[unitNum] && upd[unitNum][category]) {
              const newArray = [...upd[unitNum][category]];
              newArray.splice(indexToRemove, 1);
              if (newArray.length === 0) {
                delete upd[unitNum][category];
              } else {
                upd[unitNum][category] = newArray;
              }
            }
            return upd;

        const categories = {
          goals: unitItems.filter(i => getCategory(i.code) === 'goals'),

          skills: unitItems.filter(i => getCategory(i.code) === 'skills'),

                  </button>
                </nav>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-grow w-full">
            {items.length > 0 && activeTab !== 'course' && activeTab !== 'overview' && activeTab !== 'how-to' && loadedConfig && (
              <div className="mb-6">
                <div className="flex items-center mb-4 ml-1">
                  <img src={subjectIconMap[loadedConfig.subject]} alt={loadedConfig.subject} className="h-10 w-10 mr-4 object-contain" />
                  <h2 className="text-2xl md:text-3xl font-bold text-gray-800">Grade {loadedConfig.grade} {loadedConfig.subject}</h2>
                </div>
                <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-200 flex flex-wrap items-center gap-x-6 gap-y-3 text-sm select-none">
                  <strong className="text-gray-800 uppercase tracking-wide text-xs">Colour Legend:</strong>
                  <div onClick={() => scrollToGroup('OI')} className="flex items-center cursor-pointer hover:opacity-70 transition-opacity" title="Click to scroll to OI"><span className="w-4 h-4 rounded bg-green-100 border border-green-300 mr-2"></span> Organizing Ideas (OI)</div>
                  {activeGroups.map(num => {
                     const colorObj = colorPalette[(num - 1) % colorPalette.length];
                     return (
                       <div key={`legend-${num}`} onClick={() => scrollToGroup(num.toString())} className="flex items-center cursor-pointer hover:opacity-70 transition-opacity" title={`Click to scroll to LO.${num} / GQ.${num}`}>
                         <span className={`w-4 h-4 rounded ${colorObj.light} border ${colorObj.border} mr-2`}></span> LO.{num} / GQ.{num}
                       </div>
                     );
                  })}
                </div>
              </div>
            )}
            {activeTab === 'course' && renderCourseSelection()}
            {activeTab === 'overview' && renderOverview()}
            {activeTab === 'how-to' && renderHowToUse()}
            {activeTab === 'checklist' && items.length > 0 && renderChecklist()}
            {loadedConfig && Array.from({length: loadedConfig.numUnits}, (_, i) => i + 1).map(num => (
               activeTab === `u${num}` && items.length > 0 && <div key={`unit-${num}`}>{renderUnitView(num)}</div>
            ))}
          </main>

          <footer className="bg-white border-t border-gray-200 mt-auto py-6">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-500 text-sm flex items-center justify-center flex-wrap">
              <a href="https://example.com" className="text-eips-green hover:underline font-medium">Alberta Curriculum Unit Planner</a>&nbsp;&copy; {new Date().getFullYear()} by&nbsp;<a href="https://www.eips.ca" target="_blank" rel="noopener noreferrer" className="text-eips-green hover:underline font-medium">Elk Island Public Schools</a>&nbsp;is licensed under&nbsp;<a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" rel="noopener noreferrer" className="text-eips-green hover:underline font-medium">CC BY-NC-SA 4.0</a>
              <img src="https://mirrors.creativecommons.org/presskit/icons/cc.svg" alt="" style={{ maxWidth: '1em', maxHeight: '1em', marginLeft: '.2em' }} />
              <img src="https://mirrors.creativecommons.org/presskit/icons/by.svg" alt="" style={{ maxWidth: '1em', maxHeight: '1em', marginLeft: '.2em' }} />
              <img src="https://mirrors.creativecommons.org/presskit/icons/nc.svg" alt="" style={{ maxWidth: '1em', maxHeight: '1em', marginLeft: '.2em' }} />
              <img src="https://mirrors.creativecommons.org/presskit/icons/sa.svg" alt="" style={{ maxWidth: '1em', maxHeight: '1em', marginLeft: '.2em' }} />
            </div>
          </footer>

          {llmModal.isOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-[60]">
              <div className="bg-white p-6 rounded-lg shadow-xl max-w-3xl w-full mx-4 max-h-[90vh] flex flex-col">
                <div className="flex justify-between items-center mb-4 border-b border-gray-100 pb-3">
                  <h3 className="text-xl font-bold text-indigo-900 flex items-center"><SparkleIcon /> {llmModal.title}</h3>
                  <button onClick={() => setLlmModal({ ...llmModal, isOpen: false })} className="text-gray-400 hover:text-gray-600 transition-colors"><svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg></button>
                </div>
                <div className="flex-1 overflow-y-auto mb-4 bg-gray-50 p-4 rounded border border-gray-200">
                  {llmModal.isLoading ? (
                    <div className="flex items-center justify-center h-40 text-indigo-500 font-medium"><svg className="animate-spin -ml-1 mr-3 h-6 w-6 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Thinking...</div>
                  ) : llmModal.error ? (
                    <span className="text-red-600">{llmModal.error}</span>
                  ) : (
                    <>
                      {llmModal.type === 'pt' && llmModal.content && (
                        <div>
                           <h4 className="font-bold text-indigo-900 mb-1">Scenario</h4>
                           <FormattedAIText text={llmModal.content.scenario} />
                           <h4 className="font-bold text-indigo-900 mb-1 mt-4">Elements</h4>
                           <FormattedAIText text={llmModal.content.elements} />
                           <UdlGrid udl={llmModal.content.udl} />
                           <h4 className="font-bold text-indigo-900 mb-1 mt-4">Evaluative Criteria</h4>
                           {Array.isArray(llmModal.content.evaluativeCriteria) ? (
                              <div className="overflow-x-auto mt-2 mb-4 border border-gray-200 rounded-md">
                                <table className="min-w-full text-sm text-left">
                                  <thead className="bg-gray-100 text-gray-700">
                                    <tr>
                                      <th className="px-4 py-2 border-b border-gray-200 w-1/4">Criterion & KUSPs</th>
                                      <th className="px-4 py-2 border-b border-gray-200 w-1/3">Descriptor</th>
                                      <th className="px-4 py-2 border-b border-gray-200 w-5/12">Teacher Notes (LO Alignment)</th>
                                    </tr>
                                  </thead>
                                  <tbody className="divide-y divide-gray-200">
                                    {llmModal.content.evaluativeCriteria.map((c, i) => (
                                      <tr key={i} className="bg-white">
                                        <td className="px-4 py-3 align-top">
                                          <div className="font-bold text-gray-900"><FormattedAIText text={c.criterion} /></div>
                                          <div className="mt-2 text-xs text-gray-600">
                                            <strong className="block text-gray-700">KUSPs:</strong>
                                            <FormattedAIText text={c.kusps} />
                                          </div>
                                        </td>
                                        <td className="px-4 py-3 align-top text-gray-800"><FormattedAIText text={c.descriptor} /></td>
                                        <td className="px-4 py-3 align-top text-gray-600"><FormattedAIText text={c.teacherNotes} /></td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                           ) : (
                              <FormattedAIText text={llmModal.content.evaluativeCriteria} />
                           )}
                        </div>
                      )}
                      
                      {llmModal.type === 'transfer' && llmModal.content && llmModal.content.goals && (
                        <div className="space-y-4">
                           <div className="bg-blue-50 p-3 rounded-md border border-blue-200">
                              <h4 className="font-bold text-blue-900 text-sm">Alignment Check</h4>
                              <p className="text-sm text-blue-800">{llmModal.content.alignmentCheck}</p>
                           </div>
                           <p className="text-sm text-gray-600 mb-2 italic">Select the Transfer Goals you want to keep:</p>
                           <div className="space-y-3">
                           {llmModal.content.goals.map((g, idx) => (
                               <label key={idx} className={`flex items-start gap-3 p-3 border rounded-lg cursor-pointer transition-colors ${llmModal.selectedIndices.includes(idx) ? 'bg-indigo-50 border-indigo-300' : 'bg-white hover:bg-gray-50'}`}>
                                  <input type="checkbox" className="mt-1 flex-shrink-0 w-5 h-5 text-indigo-600 rounded-full border-gray-300 focus:ring-indigo-500" checked={llmModal.selectedIndices.includes(idx)} onChange={() => handleSelectCheckboxItem(idx)} />
                                  <div className="flex-1">
                                     <h4 className="font-bold text-indigo-900 text-base">{g.goal}</h4>
                                     <div className="mt-2 text-sm text-gray-800"><b>Rationale:</b> <FormattedAIText text={g.rationale} /></div>
                                  </div>
                               </label>
                           ))}
                           </div>
                        </div>
                      )}

                      {llmModal.type === 'evidence' && Array.isArray(llmModal.content) && (
                        <div className="space-y-3">
                           <p className="text-sm text-gray-600 mb-2 italic">Select the ongoing assessment ideas you want to keep:</p>
                           {llmModal.content.map((ev, idx) => (
                               <label key={idx} className={`flex items-start gap-3 p-3 border rounded-lg cursor-pointer transition-colors ${llmModal.selectedIndices.includes(idx) ? 'bg-indigo-50 border-indigo-300' : 'bg-white hover:bg-gray-50'}`}>
                                  <input type="checkbox" className="mt-1 flex-shrink-0 w-5 h-5 text-indigo-600 rounded-full border-gray-300 focus:ring-indigo-500" checked={llmModal.selectedIndices.includes(idx)} onChange={() => handleSelectCheckboxItem(idx)} />
                                  <div className="flex-1">
                                     <h4 className="font-bold text-indigo-900 text-base">{ev.title}</h4>
                                     <div className="flex items-center gap-2 mb-2 mt-1">
                                        <span className="bg-indigo-100 text-indigo-800 text-xs px-2 py-0.5 rounded font-bold uppercase tracking-wider">{ev.assessmentType}</span>
                                        <span className="bg-purple-100 text-purple-800 text-xs px-2 py-0.5 rounded font-bold uppercase tracking-wider">{ev.method}</span>
                                     </div>
                                     <div className="mb-2"><b>Evidence:</b> <FormattedAIText text={ev.evidence} /></div>
                                     <UdlGrid udl={ev.udl} />
                                     <div className="mt-3"><b className="text-xs text-gray-600 block mb-1">Evaluative Criteria:</b> <FormattedAIText text={ev.evaluativeCriteria} /></div>
                                  </div>
                               </label>
                           ))}
                        </div>
                      )}

                      {llmModal.type === 'selfAssessment' && Array.isArray(llmModal.content) && (
                        <div className="space-y-3">
                           <p className="text-sm text-gray-600 mb-2 italic">Select the self-assessment strategies you want to keep:</p>
                           {llmModal.content.map((sa, idx) => (
                               <label key={idx} className={`flex items-start gap-3 p-3 border rounded-lg cursor-pointer transition-colors ${llmModal.selectedIndices.includes(idx) ? 'bg-indigo-50 border-indigo-300' : 'bg-white hover:bg-gray-50'}`}>
                                  <input type="checkbox" className="mt-1 flex-shrink-0 w-5 h-5 text-indigo-600 rounded-full border-gray-300 focus:ring-indigo-500" checked={llmModal.selectedIndices.includes(idx)} onChange={() => handleSelectCheckboxItem(idx)} />
                                  <div className="flex-1">
                                     <h4 className="font-bold text-indigo-900 text-base">{sa.title}</h4>
                                     <div className="mb-2 mt-1">
                                        <span className="bg-blue-100 text-blue-800 text-xs px-2 py-0.5 rounded font-bold uppercase tracking-wider border border-blue-200">{sa.category}</span>
                                     </div>
                                     <div><FormattedAIText text={sa.description} /></div>
                                  </div>
                               </label>
                           ))}
                        </div>
                      )}

                      {llmModal.type === 'lessons' && Array.isArray(llmModal.content) && (
                        <div className="space-y-3">
                           <p className="text-sm text-gray-600 mb-2 italic">Select the activities you want to keep:</p>
                           {llmModal.content.map((lesson, idx) => (
                               <label key={idx} className={`flex items-start gap-3 p-3 border rounded-lg cursor-pointer transition-colors ${llmModal.selectedIndices.includes(idx) ? 'bg-indigo-50 border-indigo-300' : 'bg-white hover:bg-gray-50'}`}>
                                  <input type="checkbox" className="mt-1 flex-shrink-0 w-5 h-5 text-indigo-600 rounded-full border-gray-300 focus:ring-indigo-500" checked={llmModal.selectedIndices.includes(idx)} onChange={() => handleSelectCheckboxItem(idx)} />
                                  <div className="flex-1">
                                     <h4 className="font-bold text-indigo-900 text-base">{lesson.title}</h4>
                                     <div className="mb-2"><FormattedAIText text={lesson.description} /></div>
                                     <UdlGrid udl={lesson.udl} />
                                     <div className="mt-3 space-y-1">
                                        <p className="text-xs text-gray-600"><b>KUSPs:</b> {lesson.kusps}</p>
                                        <p className="text-xs text-gray-600"><b>Competencies:</b> {lesson.competencies}</p>
                                        <p className="text-xs text-gray-600"><b>Success Criteria:</b> {lesson.successCriteria}</p>
                                     </div>
                                  </div>
                               </label>
                           ))}
                        </div>
                      )}
                    </>
                  )}
                </div>
                <div className="flex justify-end space-x-3 pt-2">
                  <button onClick={() => setLlmModal({ ...llmModal, isOpen: false })} className="px-4 py-2 bg-gray-100 text-gray-700 rounded-md font-medium hover:bg-gray-200 transition-colors">Close</button>
                  {!llmModal.isLoading && !llmModal.error && (
                    <>
                      <button onClick={handleAddToTemplate} disabled={(llmModal.type === 'lessons' || llmModal.type === 'evidence' || llmModal.type === 'transfer' || llmModal.type === 'selfAssessment') && llmModal.selectedIndices.length === 0} className={`px-4 py-2 rounded-md font-medium shadow-sm transition-colors ${(llmModal.type === 'lessons' || llmModal.type === 'evidence' || llmModal.type === 'transfer' || llmModal.type === 'selfAssessment') && llmModal.selectedIndices.length === 0 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-indigo-100 text-indigo-700 border border-indigo-200 hover:bg-indigo-200'}`}>Add to Lesson Template</button>
                      <button onClick={copyLlmContent} className="px-4 py-2 bg-indigo-600 text-white rounded-md font-medium shadow-sm hover:bg-indigo-700 transition-colors">Copy to Clipboard</button>
                    </>
                  )}
                </div>
              </div>
            </div>
          )}

          {showCourseConfirm && (
            <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
              <div className="bg-white p-6 rounded-lg shadow-xl max-w-sm w-full mx-4">
                <div className="flex items-center mb-2"><WarningIcon /><h3 className="text-xl font-bold text-gray-900">Are you sure?</h3></div>
                <p className="text-gray-600 mb-6">Loading a new course will discard all your current unit checklist selections. Proceed?</p>
                <div className="flex justify-end space-x-3">
                  <button onClick={() => setShowCourseConfirm(false)} className="px-4 py-2 bg-gray-200 text-gray-800 rounded-md font-medium hover:bg-gray-300 transition-colors">Cancel</button>
                  <button onClick={executeLoadCourse} className="px-4 py-2 bg-eips-green text-white rounded-md font-medium hover:bg-opacity-90 transition-colors">Load New Course</button>
                </div>
              </div>
            </div>
          )}

          {showSavePrompt && (
            <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
              <div className="bg-white p-6 rounded-lg shadow-xl max-w-md w-full mx-4">
                <div className="flex items-center mb-4"><WarningIcon /><h3 className="text-xl font-bold text-gray-900">Unsaved Changes</h3></div>
                <p className="text-gray-600 mb-6">You have made changes to the checklist that haven't been saved. Would you like to save your progress before navigating away?</p>
                <div className="flex justify-end space-x-3">
                  <button onClick={() => { setShowSavePrompt(false); setPendingTab(null); }} className="px-4 py-2 bg-gray-100 text-gray-700 rounded-md font-medium hover:bg-gray-200 transition-colors">Cancel</button>
                  <button onClick={() => { setActiveTab(pendingTab); setShowSavePrompt(false); setPendingTab(null); }} className="px-4 py-2 bg-white border border-eips-orange text-eips-orange rounded-md font-medium hover:bg-orange-50 transition-colors">Leave Without Saving</button>
                  <button onClick={() => { handleSaveProgress(); setActiveTab(pendingTab); setShowSavePrompt(false); setPendingTab(null); }} className="px-4 py-2 bg-eips-green text-white rounded-md font-medium hover:bg-opacity-90 transition-colors">Save & Continue</button>
                </div>
              </div>
            </div>
          )}

          {showResetConfirm && (
            <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
              <div className="bg-white p-6 rounded-lg shadow-xl max-w-sm w-full mx-4">
                <h3 className="text-xl font-bold text-gray-900 mb-2">Are you sure?</h3>
                <p className="text-gray-600 mb-6">This will permanently delete all your unit selections, generated AI content, and clear your loaded course. This action cannot be undone.</p>
                <div className="flex justify-end space-x-3">
                  <button onClick={() => setShowResetConfirm(false)} className="px-4 py-2 bg-gray-200 text-gray-800 rounded-md font-medium hover:bg-gray-300 transition-colors">Cancel</button>
                  <button onClick={handleReset} className="px-4 py-2 bg-eips-orange text-white rounded-md font-medium hover:bg-opacity-90 transition-colors">Yes, Reset Everything</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    /* Native scrollbar blocker on the flex container so we can construct a tailored UX component beneath it */
    html { scroll-behavior: smooth; }
    
    .hide-native-scrollbar-x::-webkit-scrollbar:horizontal {
      height: 0px !important;
      display: none !important;
    }
    
    .custom-scrollbar-y::-webkit-scrollbar {
      width: 8px;
    }
    .custom-scrollbar-y::-webkit-scrollbar-track {
      background: #f1f1f1; 
    }
    .custom-scrollbar-y::-webkit-scrollbar-thumb {
      background: #cbd5e1; 
      border-radius: 4px;
    }
    .custom-scrollbar-y::-webkit-scrollbar-thumb:hover {
      background: #94a3b8; 
    }
    
    /* Custom scrollbar solely for our targeted horizontal tracker */
    .custom-scrollbar-x::-webkit-scrollbar {
      height: 12px;
    }
    .custom-scrollbar-x::-webkit-scrollbar-track {
      background: #f8fafc;
    }
    .custom-scrollbar-x::-webkit-scrollbar-thumb {
      background: #94a3b8; 
      border-radius: 6px;
      border: 3px solid #f8fafc;
    }
    .custom-scrollbar-x::-webkit-scrollbar-thumb:hover {
      background: #64748b; 
    }
  </style>
</body>
</html>
